<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteoro X — Autonomous Commodity Intelligence</title>

    <!-- Globe.gl -->
    <script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>

    <!-- React 18 + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel loaded before React app below -->

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: #000008;
            color: #e0e8f0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        /* ═══ GLOBE ═══ */
        #globeViz {
            position: fixed; inset: 0;
            z-index: 0;
            transition: filter 0.8s ease;
            animation: globe-in 2.5s ease-out;
        }
        @keyframes globe-in {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* ═══ VISUAL MODES ═══ */
        body.nvg #globeViz { filter: saturate(0) brightness(0.5) contrast(1.4); }
        body.nvg .hud-panel { border-color: #00ff41 !important; }
        body.nvg .hud-panel, body.nvg .hud-val, body.nvg .hud-lbl,
        body.nvg .mode-btn, body.nvg #alert-text, body.nvg #logo-main,
        body.nvg #logo-sub { color: #00ff41 !important; }
        body.nvg .hud-val { text-shadow: 0 0 20px #00ff41 !important; }
        body.nvg #nvg-over, body.nvg #scanlines { display: block; }

        body.flir #globeViz { filter: saturate(1.8) contrast(1.5) hue-rotate(-15deg) brightness(0.7); }
        body.flir .hud-panel { border-color: #ff4400 !important; }
        body.flir .hud-val { color: #ff6600 !important; text-shadow: 0 0 20px #ff4400 !important; }
        body.flir #logo-main, body.flir #logo-sub { color: #ff6600 !important; }

        body.sat #globeViz { filter: brightness(1.15) contrast(1.1) saturate(0.7); }

        /* ═══ OVERLAYS ═══ */
        #vignette {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,8,0.7) 100%);
            pointer-events: none;
        }
        #nvg-over {
            display: none; position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(ellipse at center, rgba(0,255,65,0.02) 0%, rgba(0,40,10,0.35) 100%);
            pointer-events: none; mix-blend-mode: screen;
        }
        #scanlines {
            display: none; position: fixed; inset: 0; z-index: 3;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.03) 2px, rgba(0,255,65,0.03) 4px);
            pointer-events: none; animation: scanmove 8s linear infinite;
        }
        @keyframes scanmove { to { transform: translateY(4px); } }

        /* ═══ HUD PANELS ═══ */
        .hud-panel {
            position: fixed;
            background: rgba(0,6,20,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,180,255,0.15);
            z-index: 10;
            padding: 14px 18px;
            transition: border-color 0.5s, color 0.5s;
        }

        /* Logo — top left */
        #hud-logo { top: 20px; left: 20px; }
        #logo-main {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 20px; color: #fff;
            letter-spacing: 5px;
        }
        #logo-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #00b4ff; letter-spacing: 3px; margin-top: 3px;
        }
        #live-dot {
            display: inline-block; width: 7px; height: 7px;
            background: #ff0040; border-radius: 50%; margin-left: 10px;
            animation: livep 1.5s ease-in-out infinite; vertical-align: middle;
        }
        @keyframes livep { 0%,100%{opacity:1;box-shadow:0 0 8px #ff0040} 50%{opacity:0.3;box-shadow:0 0 2px #ff0040} }

        /* Modes — top right */
        #hud-modes { top: 20px; right: 20px; display: flex; gap: 2px; padding: 4px; }
        .mode-btn {
            background: transparent; border: 1px solid rgba(0,180,255,0.12);
            color: #506070; font-family: 'Share Tech Mono', monospace;
            font-size: 10px; padding: 7px 14px; cursor: pointer;
            letter-spacing: 2px; transition: all 0.3s;
        }
        .mode-btn:hover { color: #00b4ff; border-color: rgba(0,180,255,0.4); }
        .mode-btn.active {
            background: rgba(0,180,255,0.1); color: #00d4ff;
            border-color: #00b4ff; text-shadow: 0 0 10px rgba(0,180,255,0.5);
        }

        /* Alerts — top center */
        #hud-alerts {
            top: 20px; left: 50%; transform: translateX(-50%);
            max-width: 520px; width: 80vw; text-align: center;
            padding: 8px 18px; border-color: rgba(255,60,60,0.12);
        }
        #alert-pfx { color: #ff4444; font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 3px; }
        #alert-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #8090a0; margin-top: 3px;
            min-height: 16px; transition: opacity 0.5s;
        }

        /* Layers — left center */
        #hud-layers { top: 50%; left: 20px; transform: translateY(-50%); padding: 10px 14px; }
        .lyr-row {
            display: flex; align-items: center; gap: 8px; padding: 5px 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; letter-spacing: 2px; color: #405060;
            cursor: pointer; transition: color 0.3s;
        }
        .lyr-row:hover { color: #00b4ff; }
        .lyr-row.on { color: #90a0b0; }
        .lyr-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .lyr-row.on .lyr-dot { box-shadow: 0 0 6px currentColor; }

        /* Stats — bottom left */
        #hud-stats { bottom: 20px; left: 20px; display: flex; gap: 18px; }
        .stat-blk { text-align: center; }
        .hud-val {
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 22px; color: #00d4ff;
            text-shadow: 0 0 12px rgba(0,180,255,0.3);
        }
        .hud-lbl {
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; color: #405060; letter-spacing: 3px; margin-top: 2px;
        }

        /* Coords — bottom right */
        #hud-coords {
            bottom: 20px; right: 20px;
            font-family: 'Share Tech Mono', monospace; font-size: 10px; text-align: right;
        }
        .crd { color: #304050; margin-bottom: 2px; }
        .crd span { color: #00a0cc; }

        /* Legend — bottom center */
        #hud-legend {
            bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 14px; padding: 6px 16px;
        }
        .leg-item {
            display: flex; align-items: center; gap: 5px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; letter-spacing: 1px; color: #405060;
        }
        .leg-bar { width: 16px; height: 2px; border-radius: 1px; }

        /* Version */
        #ver {
            position: fixed; bottom: 5px; right: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; color: #182030; letter-spacing: 3px; z-index: 10;
        }

        /* ═══ REACT UI OVERLAY ═══ */
        #react-root {
            position: fixed; inset: 0;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .glass {
            background: rgba(2, 6, 18, 0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0,180,255,0.1);
            border-radius: 10px;
            pointer-events: auto;
        }

        /* Center prompt — removed for clean globe view */

        /* Search bar */
        .search-bar {
            width: 100%; max-width: 480px;
            margin-bottom: 36px; padding: 0 20px;
            pointer-events: auto;
        }
        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-in {
            width: 100%; padding: 12px 44px 12px 18px;
            background: rgba(2,6,18,0.75);
            border: 1px solid rgba(0,180,255,0.1);
            border-radius: 10px; color: #e0e8f0;
            font-family: 'Inter', sans-serif; font-size: 14px;
            outline: none; transition: all 0.3s;
            backdrop-filter: blur(20px);
        }
        .search-in::placeholder { color: #405060; }
        .search-in:focus { border-color: rgba(0,180,255,0.25); background: rgba(2,8,24,0.95); }
        .search-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #506070;
            cursor: pointer; font-size: 18px; padding: 4px 8px; transition: color 0.2s;
        }
        .search-btn:hover { color: #00b4ff; }

        /* Chips */
        .chips-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 16px;
            pointer-events: auto; padding: 0 20px;
        }
        .chip {
            padding: 5px 12px;
            background: rgba(0,180,255,0.03);
            border: 1px solid rgba(0,180,255,0.08);
            border-radius: 16px; color: #506070;
            font-size: 11px; cursor: pointer;
            font-weight: 500; white-space: nowrap;
            transition: all 0.3s; font-family: 'Inter', sans-serif;
        }
        .chip:hover {
            border-color: rgba(0,180,255,0.3); color: #00b4ff;
            background: rgba(0,180,255,0.06);
        }

        /* Analysis panel — compact right-side */
        .analysis-panel {
            position: fixed;
            right: 20px; top: 80px;
            width: 360px; max-height: 70vh;
            overflow-y: auto; padding: 18px;
            pointer-events: auto;
            scrollbar-width: none;
            margin: 0;
        }
        .analysis-panel::-webkit-scrollbar { display: none; }

        .a-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .a-dot {
            width: 6px; height: 6px; background: #06D6A0; border-radius: 50%;
            animation: apulse 1.5s ease-in-out infinite;
        }
        @keyframes apulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .a-label { font-size: 13px; color: #607080; font-weight: 500; }

        .a-steps { max-height: 240px; overflow-y: auto; scrollbar-width: none; }
        .a-steps::-webkit-scrollbar { display: none; }

        .a-step {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 5px 0; font-size: 12px; color: #506070;
            line-height: 1.5; transition: all 0.3s;
            animation: stepin 0.3s ease;
        }
        @keyframes stepin { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
        .a-step.done { color: #405060; }
        .a-step.now { color: #708090; }
        .a-icon {
            width: 14px; height: 14px; min-width: 14px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 8px; font-weight: 700;
            margin-top: 2px; flex-shrink: 0;
        }
        .a-icon.pend { background: rgba(0,180,255,0.06); color: #405060; }
        .a-icon.spin { background: rgba(0,180,255,0.08); color: #506070; animation: aspin 1.8s linear infinite; }
        .a-icon.chk { background: rgba(6,214,160,0.08); color: #06D6A0; }
        @keyframes aspin { to { transform: rotate(360deg); } }

        .a-timer {
            margin-left: auto;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px; color: #00b4ff;
            letter-spacing: 1px;
            opacity: 0.7;
        }
        .phase-bar {
            display: flex; gap: 4px; margin-bottom: 12px;
            justify-content: center;
        }
        .phase-dot {
            width: 24px; height: 3px; border-radius: 2px;
            background: rgba(0,180,255,0.08);
            transition: all 0.5s ease;
        }
        .phase-dot.active {
            background: #00b4ff;
            box-shadow: 0 0 8px rgba(0,180,255,0.4);
        }
        .phase-dot.done {
            background: #06D6A0;
        }
        .a-step.retry { color: #F59E0B !important; }
        .a-counter {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #06D6A0; margin-top: 8px; letter-spacing: 0.5px;
        }

        /* Signal card */
        .sig-card {
            border: 1px solid rgba(0,180,255,0.08);
            border-radius: 10px; padding: 20px;
            margin-bottom: 16px; display: flex;
            justify-content: space-between; align-items: center;
            gap: 16px; background: rgba(0,10,30,0.5);
            backdrop-filter: blur(12px);
            transition: border-color 0.5s, box-shadow 0.5s;
            animation: card-in 0.6s ease-out;
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sig-card:has(.sig-dir.long) {
            border-color: rgba(16,185,129,0.2);
            box-shadow: 0 0 30px rgba(16,185,129,0.06), inset 0 0 30px rgba(16,185,129,0.02);
        }
        .sig-card:has(.sig-dir.short) {
            border-color: rgba(239,68,68,0.2);
            box-shadow: 0 0 30px rgba(239,68,68,0.06), inset 0 0 30px rgba(239,68,68,0.02);
        }
        .sig-dir {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; font-weight: 600; margin-bottom: 2px;
        }
        .sig-dir.long { color: #10B981; }
        .sig-dir.short { color: #EF4444; }
        .sig-dir.hold { color: #F59E0B; }
        .sig-ticker { font-size: 22px; font-weight: 700; color: #e5e5e5; }
        .sig-price {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px; color: #90a0b0; margin-top: 2px;
        }
        .sig-price .up { color: #10B981; margin-left: 6px; font-size: 11px; }
        .sig-price .down { color: #EF4444; margin-left: 6px; font-size: 11px; }

        .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .gauge-svg { width: 72px; height: 72px; }
        .gauge-lbl { font-size: 8px; color: #506070; text-transform: uppercase; letter-spacing: 1px; }

        .sig-split {
            display: flex; gap: 6px; align-items: center;
            font-family: 'Share Tech Mono', monospace; font-size: 10px;
        }
        .sig-split .bull { color: #10B981; }
        .sig-split .bear { color: #EF4444; }
        .sig-split .neut { color: #506070; }

        /* Narrative */
        .narrative { margin-bottom: 16px; animation: card-in 0.5s ease-out 0.2s both; }
        .narrative p { color: #90a0b0; font-size: 12px; line-height: 1.7; margin-bottom: 10px; }
        .narrative p:last-child { margin-bottom: 0; }
        .narrative .consensus {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; color: #8090a0;
            padding: 10px 14px; margin-bottom: 10px;
            border-left: 2px solid rgba(0,180,255,0.3);
            background: rgba(0,10,30,0.4);
            border-radius: 0 6px 6px 0;
        }
        .narrative .section-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; color: rgba(255,255,255,0.25);
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 6px;
        }

        /* Key findings */
        .findings { margin-bottom: 16px; }
        .finding-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,180,255,0.04);
            font-size: 11px; line-height: 1.5;
            animation: finding-in 0.4s ease-out both;
        }
        .finding-item:nth-child(1) { animation-delay: 0.1s; }
        .finding-item:nth-child(2) { animation-delay: 0.2s; }
        .finding-item:nth-child(3) { animation-delay: 0.3s; }
        .finding-item:nth-child(4) { animation-delay: 0.4s; }
        @keyframes finding-in {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .finding-item:last-child { border-bottom: none; }
        .finding-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 3px;
        }
        .finding-agent {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; color: #506070; letter-spacing: 1px;
        }
        .finding-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; padding: 1px 6px; border-radius: 3px;
            letter-spacing: 0.5px;
        }
        .finding-badge.buy { color: #10B981; background: rgba(16,185,129,0.08); }
        .finding-badge.sell { color: #EF4444; background: rgba(239,68,68,0.08); }
        .finding-badge.hold { color: #F59E0B; background: rgba(245,158,11,0.08); }
        .finding-text { color: #708090; }
        .finding-bar {
            width: 100%; height: 3px; background: rgba(0,180,255,0.06);
            border-radius: 2px; margin-top: 4px; overflow: hidden;
        }
        .finding-bar-fill {
            height: 100%; border-radius: 2px; transition: width 0.8s ease;
        }
        .finding-bar-fill.buy { background: linear-gradient(90deg, #10B981, #34D399); }
        .finding-bar-fill.sell { background: linear-gradient(90deg, #EF4444, #F87171); }
        .finding-bar-fill.hold { background: linear-gradient(90deg, #F59E0B, #FBBF24); }

        .a-meta {
            display: flex; gap: 14px; padding-top: 12px;
            border-top: 1px solid rgba(0,180,255,0.06);
            flex-wrap: wrap;
        }
        .a-meta-item {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #405060;
        }
        .a-meta-item span { color: #607080; }

        /* Speed comparison */
        .speed-compare {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 12px 0; margin: 8px 0;
            border-top: 1px solid rgba(0,180,255,0.06);
        }
        .speed-ai, .speed-human { text-align: center; }
        .speed-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px; font-weight: 700;
            display: block;
        }
        .speed-ai .speed-val { color: #06D6A0; }
        .speed-human .speed-val { color: #506070; }
        .speed-lbl {
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; letter-spacing: 2px; color: #405060;
            text-transform: uppercase;
        }
        .speed-vs {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #304050; letter-spacing: 1px;
        }

        /* Reset */
        .reset-btn {
            padding: 8px 18px; background: transparent;
            border: 1px solid rgba(0,180,255,0.1);
            border-radius: 6px; color: #506070; cursor: pointer;
            font-size: 11px; font-family: 'Inter', sans-serif;
            font-weight: 500; transition: all 0.3s; margin-top: 12px;
        }
        .reset-btn:hover { border-color: rgba(0,180,255,0.3); color: #00b4ff; }
        .share-btn { border-color: rgba(6,214,160,0.15); }
        .share-btn:hover { border-color: rgba(6,214,160,0.4); color: #06D6A0; }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 768px) {
            #hud-logo { top: 8px; left: 8px; padding: 8px 12px; }
            #logo-main { font-size: 14px; letter-spacing: 3px; }
            #logo-sub { font-size: 7px; letter-spacing: 2px; }
            #hud-modes, #hud-alerts, #hud-layers { display: none; }
            #hud-stats { bottom: auto; top: 8px; right: 8px; left: auto; padding: 6px 10px; gap: 10px; }
            .hud-val { font-size: 14px; }
            .hud-lbl { font-size: 6px; }
            #hud-coords { display: none; }
            #hud-legend { display: none; }
            #ver { font-size: 6px; }

            .analysis-panel {
                position: fixed; right: 0; left: 0; top: auto; bottom: 70px;
                width: 100%; max-width: 100%; max-height: 55vh;
                border-radius: 12px 12px 0 0; padding: 14px;
            }
            .search-bar { max-width: 100%; margin-bottom: 20px; padding: 0 12px; }
            .search-in { font-size: 16px; padding: 14px 44px 14px 14px; } /* prevent iOS zoom */
            .chips-bar { gap: 6px; padding: 0 12px; margin-bottom: 10px; }
            .chip { font-size: 10px; padding: 4px 10px; }
            .sig-card { flex-direction: row; gap: 12px; padding: 14px; }
            .sig-ticker { font-size: 18px; }
            .sig-price { font-size: 12px; }
            .gauge-svg { width: 60px; height: 60px; }
            .narrative p { font-size: 11px; }
            .narrative .consensus { font-size: 10px; }
            .finding-item { font-size: 10px; }
            .a-meta { gap: 10px; }
            .a-meta-item { font-size: 9px; }
            .speed-compare { padding: 8px 0; }
            .speed-val { font-size: 14px; }
        }

        /* Extra small screens */
        @media (max-width: 380px) {
            .analysis-panel { max-height: 50vh; padding: 10px; }
            .sig-card { padding: 10px; }
            .sig-ticker { font-size: 16px; }
            .chips-bar { gap: 4px; }
            .chip { font-size: 9px; padding: 3px 8px; }
        }
    </style>
</head>
<body>

<!-- Globe -->
<div id="globeViz"></div>

<!-- Overlays -->
<div id="vignette"></div>
<div id="nvg-over"></div>
<div id="scanlines"></div>

<!-- HUD: Logo -->
<div id="hud-logo" class="hud-panel">
    <div id="logo-main">METEORO X</div>
    <div id="logo-sub">W O R L D V I E W <span id="live-dot"></span></div>
</div>

<!-- HUD: Modes -->
<div id="hud-modes" class="hud-panel">
    <button class="mode-btn active" data-mode="default">DEFAULT</button>
    <button class="mode-btn" data-mode="nvg">NVG</button>

        .atmosphereAltitude(0.16)
        .pointsData(pts).pointLat('lat').pointLng('lng').pointColor('color')
        .pointAltitude('alt').pointRadius('size').pointsMerge(true)
        .arcsData(arcs).arcStartLat('startLat').arcStartLng('startLng')
        .arcEndLat('endLat').arcEndLng('endLng').arcColor('color')
        .arcDashLength(0.4).arcDashGap(0.2).arcDashAnimateTime(3000).arcStroke(0.4)
        .ringsData(rings).ringLat('lat').ringLng('lng')
        .ringMaxRadius('maxR').ringPropagationSpeed('speed').ringRepeatPeriod(2000)
        .ringColor(function(){return function(t){return 'rgba(0,200,255,'+Math.max(0,1-t)+')'}})
        .labelsData(labels).labelLat('lat').labelLng('lng').labelText('text')

        {sLat:11.08,sLng:-72.67,eLat:10.96,eLng:-74.78,n:'Cerrejón→Barranquilla'},

    function updateVessels() {
        vessels.forEach(function(v) {

        world.arcsData(arcs).arcStroke(function(d){return d.commodity==='rail'?0.2:0.4});

        var loc = locs[commodity] || locs.GENERAL;
        var pulseColor = direction === 'LONG' ? 'rgba(16,185,129,' : direction === 'SHORT' ? 'rgba(239,68,68,' : 'rgba(245,158,11,';

        // Add 3 dramatic pulse rings
        var pulseRings = [
            {lat:loc.lat, lng:loc.lng, maxR:6, speed:3, color: function(t){return pulseColor + Math.max(0,0.8-t) + ')'}},

        // Return to normal rings after 4 seconds
        setTimeout(function(){ world.ringsData(rings); }, 4000);

    // HUD updates
    function animC(id,target,dur) {

            cur+=inc;
            if((inc>0&&cur>=target)||(inc<0&&cur<=target)){cur=target;clearInterval(t)}

    // Layer toggles
    document.querySelectorAll('.lyr-row').forEach(function(row){
        row.addEventListener('click',function(){
            row.classList.toggle('on');
            // Simplified: just toggle visibility
        });
    });

    // Resize
    window.addEventListener('resize',function(){world.width(window.innerWidth);world.height(window.innerHeight)});
})();
</script>

        iron:'IRON',hierro:'IRON',vale:'IRON',pilbara:'IRON',
        gold:'GOLD',oro:'GOLD',bullion:'GOLD',
        silver:'SILVER',plata:'SILVER',
        oil:'OIL',petroleo:'OIL','petróleo':'OIL',crudo:'OIL',brent:'OIL',wti:'OIL',opec:'OIL',

        nickel:'NICKEL',niquel:'NICKEL','níquel':'NICKEL',norilsk:'NICKEL',

        lithium:'LITHIUM',litio:'LITHIUM',sqm:'LITHIUM',
        coffee:'COFFEE',cafe:'COFFEE','café':'COFFEE',arabica:'COFFEE',
        wheat:'WHEAT',trigo:'WHEAT',

        corn:'CORN',maiz:'CORN','maíz':'CORN',
        sugar:'SUGAR',azucar:'SUGAR','azúcar':'SUGAR',
        baltic:'SHIPPING',freight:'SHIPPING',flete:'SHIPPING',
        platinum:'PLATINUM',platino:'PLATINUM',
        palladium:'PALLADIUM',paladio:'PALLADIUM',
    };
    for(const [k,v] of Object.entries(kw)){
        if(l.includes(k))return v;
    }
    return 'GENERAL';
}

function Gauge({conviction}){
    const c=conviction&&typeof conviction==='number'?Math.max(0,Math.min(100,conviction)):85;
    const r=34,circ=2*Math.PI*r,off=circ-(c/100)*circ;
    return(
        <svg className="gauge-svg" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r={r} fill="none" stroke="rgba(0,180,255,0.08)" strokeWidth="5"/>
            <circle cx="40" cy="40" r={r} fill="none" stroke="#06D6A0" strokeWidth="5"
                strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
                style={{transform:'rotate(-90deg)',transformOrigin:'40px 40px',transition:'stroke-dashoffset 0.6s ease'}}/>
            <text x="40" y="44" textAnchor="middle" fill="#e0e8f0" fontSize="16" fontWeight="700"
                fontFamily="'Orbitron',sans-serif">{c}%</text>
        </svg>
    );
}

function SafeText({text,fallback=''}){
    return String(text||fallback);
}

function App(){
    const [input,setInput]=useState('');
    const [analyzing,setAnalyzing]=useState(false);
    const [results,setResults]=useState(null);
    const [steps,setSteps]=useState([]);
    const [phase,setPhase]=useState('idle');
    const [error,setError]=useState(null);
    const [elapsed,setElapsed]=useState(0);
    const stepsRef=useRef(null);
    const panelRef=useRef(null);
    const elapsedRef=useRef(null);
    const searchingRef=useRef(false);

    const phaseStreams={
        init:['Conectando con sistema de inteligencia autónoma...','Inicializando sensores y fuentes de datos...'],
        data:['Obteniendo precios spot en tiempo real...','Descargando indicadores macro y FX...','Consultando eventos geopolíticos...'],
        alpha:['Desplegando reconocimiento satelital...','Rastreando tráfico marítimo...','Analizando disrupciones en suministro...'],
        bravo:['Analizando inteligencia OSINT...','Evaluando demanda asiática...','Procesando riesgo geopolítico...'],
        charlie:['Detectando régimen macro...','Calculando señales cuantitativas...','Evaluando sentimiento institucional...'],
        risk:['Risk Guardian verificando...','Analizando correlaciones y límites...'],
        consensus:['Convergiendo señales...','Generando análisis autónomo...'],
    };

    const chips=[
        'Analiza cobre Perú','Oro — ¿comprar o vender?','Petróleo OPEC','Café arabica Colombia',
        'Litio Chile SQM','Carbón Cerrejón','Trigo guerra Ucrania','Cacao crisis Ghana',
        'Uranio demanda nuclear','Gas natural LNG Europa',
    ];

    useEffect(()=>{
        if(stepsRef && stepsRef.current){
            stepsRef.current.scrollTop=stepsRef.current.scrollHeight;
        }
    },[steps]);

    useEffect(()=>{
        if(analyzing){
            setElapsed(0);
            const iv=setInterval(()=>setElapsed(t=>t+1),1000);
            elapsedRef.current=iv;
            return ()=>{clearInterval(iv)};
        }
    },[analyzing]);

    const callApi=async(query,attempt)=>{
        if(!query)throw new Error('Query vació');
        const maxAttempts=2;
        const controller=new AbortController();
        const timeout=setTimeout(()=>controller.abort(),90000);
        try{
            const res=await fetch(`${getApiBase()}/api/analyze`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({command:query,language:'es'}),
                signal:controller.signal,
            });
            clearTimeout(timeout);
            if(!res)throw new Error('No response');
            if(res.ok){
                const json=await res.json();
                return json||null;
            }
            if((res.status===502||res.status===503)&&attempt<maxAttempts){
                return null;
            }
            const text=await res.text().catch(()=>'');
            throw new Error(`API ${res.status}: ${text.slice(0,100)}`);
        }catch(e){
            clearTimeout(timeout);
            const msg=e && typeof e==='object'?(e.message||String(e)):'Unknown error';
            if(msg.includes('AbortError')&&attempt<maxAttempts)return null;
            if(msg.includes('Failed to fetch')&&attempt<maxAttempts)return null;
            throw e;
        }
    };

    const getDirection=(d)=>{
        if(!d)return 'HOLD';
        const s=String(d||'').toUpperCase();
        const m={'BUY':'LONG','SELL':'SHORT','LONG':'LONG','SHORT':'SHORT'};
        return m[s]||'HOLD';
    };

    const handleSearch=async(query)=>{
        const q=(query||input||'').trim();
        if(!q)return;
        if(searchingRef.current)return;
        searchingRef.current=true;

        setInput(q);
        setAnalyzing(true);
        setResults(null);
        setPhase('init');
        setSteps([]);
        setError(null);

        const commodity=detectCommodity(q);
        if(window.flyToCommodity){
            try{window.flyToCommodity(commodity)}catch(e){console.warn('flyToCommodity error',e)}
        }
        if(window.highlightRoutes){
            try{window.highlightRoutes(commodity)}catch(e){console.warn('highlightRoutes error',e)}
        }

        const allPhases=['init','data','alpha','bravo','charlie','risk'];
        let phaseIdx=0,stepIdx=0,apiDone=false;
        const iv=setInterval(()=>{
            if(apiDone){clearInterval(iv);return}
            const pname=allPhases[phaseIdx];
            const psteps=(phaseStreams[pname]||[]);
            if(stepIdx<psteps.length){
                setSteps(p=>[...(Array.isArray(p)?p:[]),psteps[stepIdx]]);
                setPhase(pname);
                stepIdx++;
            } else {
                phaseIdx++;
                stepIdx=0;
                if(phaseIdx>=allPhases.length)phaseIdx=0;
            }
        },1800);

        try{
            let data=await callApi(q,1);
            if(!data){
                setSteps(p=>[...(Array.isArray(p)?p:[]),'⟳ Servidor despertando...']);
                setPhase('init');
                await new Promise(r=>setTimeout(r,3000));
                data=await callApi(q,2);
            }
            apiDone=true;
            clearInterval(iv);
            if(data){
                setSteps(p=>[...(Array.isArray(p)?p:[]),...(phaseStreams.consensus||[])]);
                setPhase('consensus');
                await new Promise(r=>setTimeout(r,600));
                setPhase('done');
                setResults(data);
                const sig=(data&&typeof data==='object')?(data.signal||{}):null;
                const dir=getDirection((sig && typeof sig==='object')?(sig.direction||sig.action):null);
                if(window.pulseResult){
                    try{window.pulseResult(commodity,dir)}catch(e){console.warn('pulseResult error',e)}
                }
            } else {
                throw new Error('No response');
            }
        }catch(e){
            apiDone=true;
            clearInterval(iv);
            setSteps(p=>[...(Array.isArray(p)?p:[]),'Error en análisis']);
            setPhase('done');
            const errMsg=e&&typeof e==='object'?(e.message||String(e)):'Connection error';
            setError(errMsg);
        }
        setAnalyzing(false);
        searchingRef.current=false;
        if(window.resetRoutes){
            setTimeout(()=>{
                try{window.resetRoutes()}catch(e){console.warn('resetRoutes error',e)}
            },5000);
        }
    };

    const handleReset=()=>{
        searchingRef.current=false;
        setResults(null);
        setInput('');
        setPhase('idle');
        setSteps([]);
        setError(null);
        setAnalyzing(false);
        if(window.resetRoutes){
            try{window.resetRoutes()}catch(e){}
        }
        if(window.meteoroGlobe){
            try{window.meteoroGlobe.pointOfView({lat:0,lng:-45,altitude:2.8},1500)}catch(e){}
        }

    const showChips=!analyzing&&!results&&!error;
    const showPanel=analyzing||results||error;

    const renderResults=()=>{
        try{
            if(!results||typeof results!=='object')return null;
            const sig=(results.signal||{});
            const pd=(results.price_data||{});

            const dims=Array.isArray(ib.dimensions)?ib.dimensions:[];
            const ep=(ib.execution_plan&&typeof ib.execution_plan==='object')?ib.execution_plan:{};
            const dir=getDirection((sig && typeof sig==='object')?(sig.direction||sig.action):null);
            const price=Number(pd.price)||0;
            const changePct=Number(pd.change_pct)||0;
            const conviction=Number(sig.conviction||(results.conviction||0));
            const ticker=SafeText(sig.ticker||(results.commodity||'COMMODITY'));
            const bullCnt=Number(sw.agents_bullish)||0;
            const bearCnt=Number(sw.agents_bearish)||0;
            const neutCnt=Number(sw.agents_neutral)||0;

            return(
                <>
                    <div className="sig-card">
                        <div>
                            <div className={`sig-dir ${dir==='LONG'?'long':dir==='SHORT'?'short':'hold'}`}>
                                ● {dir}
                            </div>
                            <div className="sig-ticker">{ticker}</div>
                            {price>0 && (
                                <div className="sig-price">
                                    ${price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
                                    <span className={changePct>=0?'up':'down'}>
                                        {changePct>=0?'▲':'▼'}{Math.abs(changePct)}%
                                    </span>
                                </div>
                            )}
                            <div className="sig-split" style={{marginTop:'6px'}}>
                                <span className="bull">▲{bullCnt}</span>
                                <span className="bear">▼{bearCnt}</span>
                                <span className="neut">●{neutCnt}</span>
                            </div>
                        </div>
                        <div className="gauge-wrap">
                            <Gauge conviction={conviction}/>

                        </div>
                    </div>

                    {ib && typeof ib==='object' && (
                        <>
                            {ib.headline && (
                                <div style={{
                                    fontSize:'14px',fontWeight:600,color:'#e5e5e5',
                                    marginBottom:'12px',lineHeight:1.4,animation:'card-in 0.4s ease-out',
                                }}>
                                    {SafeText(ib.headline)}
                                </div>
                            )}

                            {(ib.summary||(results && results.what_happened)) && (
                                <div style={{
                                    fontSize:'12px',color:'#90a0b0',lineHeight:1.7,
                                    marginBottom:'16px',animation:'card-in 0.5s ease-out 0.1s both',
                                }}>
                                    {SafeText(ib.summary||(results && results.what_happened))}
                                </div>

                            {dims.length>0 && (
                                <div style={{marginBottom:'16px',animation:'card-in 0.5s ease-out 0.2s both'}}>
                                    <div style={{
                                        fontFamily:'Share Tech Mono,monospace',fontSize:'8px',
                                        color:'rgba(255,255,255,0.3)',letterSpacing:'2px',
                                        marginBottom:'10px',textTransform:'uppercase'
                                    }}>Radar de Inteligencia</div>
                                    {dims.filter(d=>d && d.score>0).map((d,i)=>{
                                        const dCol=d.direction==='BULLISH'?'#10B981':d.direction==='BEARISH'?'#EF4444':'#6B7280';
                                        const dWrd=d.direction==='BULLISH'?'Alcista':d.direction==='BEARISH'?'Bajista':'Neutral';
                                        const dScore=Number(d.score||0);
                                        return(
                                            <div key={i} style={{marginBottom:'8px',animation:`finding-in 0.4s ease-out ${0.1*i}s both`}}>
                                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'3px'}}>
                                                    <span style={{fontFamily:'Share Tech Mono,monospace',fontSize:'10px',color:'#8090a0'}}>
                                                        {SafeText(d.label)}
                                                    </span>
                                                    <span style={{fontFamily:'Share Tech Mono,monospace',fontSize:'9px',color:dCol}}>

                                                </div>

                                                    <div style={{width:dScore+'%',height:'100%',borderRadius:'2px',
                                                        background:`linear-gradient(90deg, ${dCol}80, ${dCol})`,
                                                        transition:'width 1s ease'}}></div>
                                                </div>
                                                {d.finding && (
                                                    <div style={{fontSize:'10px',color:'#607080',marginTop:'3px',lineHeight:1.4}}>
                                                        {SafeText(d.finding).slice(0,120)}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {ep.entry>0&&ep.stop_loss>0&&ep.take_profit>0&&dir!=='HOLD' && (
                                <div style={{
                                    padding:'12px 14px',marginBottom:'14px',borderRadius:'8px',
                                    background:'rgba(0,180,255,0.04)',border:'1px solid rgba(0,180,255,0.1)',
                                    animation:'card-in 0.5s ease-out 0.3s both',
                                }}>
                                    <div style={{
                                        fontFamily:'Share Tech Mono,monospace',fontSize:'8px',
                                        color:'rgba(255,255,255,0.3)',letterSpacing:'2px',
                                        marginBottom:'8px',textTransform:'uppercase'

                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
                                        <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'11px'}}>
                                            <span style={{color:'#506070'}}>Entrada </span>
                                            <span style={{color:'#e5e5e5'}}>
                                                ${Number(ep.entry||0).toLocaleString(undefined,{maximumFractionDigits:2})}
                                            </span>
                                        </div>
                                        <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'11px'}}>
                                            <span style={{color:'#506070'}}>Stop </span>
                                            <span style={{color:'#EF4444'}}>
                                                ${Number(ep.stop_loss||0).toLocaleString(undefined,{maximumFractionDigits:2})}
                                            </span>
                                            {ep.entry>0 && (
                                                <span style={{color:'#506070',fontSize:'9px'}}>
                                                    {' '}({(((Number(ep.stop_loss||0)-Number(ep.entry||0))/(Number(ep.entry||1))*100).toFixed(1))}%)
                                                </span>
                                            )}
                                        </div>
                                        <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'11px'}}>
                                            <span style={{color:'#506070'}}>Target </span>
                                            <span style={{color:'#10B981'}}>
                                                ${Number(ep.take_profit||0).toLocaleString(undefined,{maximumFractionDigits:2})}
                                            </span>
                                            {ep.entry>0 && (
                                                <span style={{color:'#506070',fontSize:'9px'}}>
                                                    {' '}(+{(((Number(ep.take_profit||0)-Number(ep.entry||0))/(Number(ep.entry||1))*100).toFixed(1))}%)
                                                </span>
                                            )}
                                        </div>
                                        <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'11px'}}>
                                            <span style={{color:'#506070'}}>Tamaño </span>
                                            <span style={{color:'#e5e5e5'}}>{Number(ep.position_size||0)}%</span>
                                        </div>
                                    </div>
                                    {ep.entry>0&&ep.stop_loss>0&&ep.take_profit>0 && (
                                        <div style={{fontFamily:'Share Tech Mono,monospace',fontSize:'9px',color:'#506070',marginTop:'6px'}}>
                                            R:R {Math.abs((Number(ep.take_profit||0)-Number(ep.entry||0))/(Number(ep.entry||1)-Number(ep.stop_loss||0))).toFixed(1)}:1
                                        </div>
                                    )}
                                </div>
                            )}

                            {ib.key_risk && (
                                <div style={{
                                    padding:'10px 14px',marginBottom:'14px',borderRadius:'8px',
                                    background:'rgba(239,68,68,0.04)',border:'1px solid rgba(239,68,68,0.1)',
                                    animation:'card-in 0.5s ease-out 0.35s both',
                                }}>
                                    <div style={{
                                        fontFamily:'Share Tech Mono,monospace',fontSize:'8px',
                                        color:'rgba(239,68,68,0.5)',letterSpacing:'2px',
                                        marginBottom:'4px',textTransform:'uppercase'
                                    }}>⚠ Riesgo Clave</div>
                                    <div style={{fontSize:'11px',color:'#a08080',lineHeight:1.5}}>
                                        {SafeText(ib.key_risk).slice(0,200)}
                                    </div>
                                </div>
                            )}

                            {(results && results.risk_assessment && results.risk_assessment.veto_active) && (
                                <div style={{
                                    padding:'10px 14px',margin:'0 0 12px',borderRadius:'8px',
                                    background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.2)',
                                    fontFamily:'Share Tech Mono,monospace',fontSize:'11px',color:'#EF4444',
                                    letterSpacing:'0.5px',textAlign:'center',fontWeight:600
                                }}>
                                    VETO ACTIVO — Riesgo elevado
                                </div>
                            )}

                            <div className="a-meta">
                                {results && results.pipeline_latency_ms && (
                                    <div className="a-meta-item">
                                        {(Number(results.pipeline_latency_ms||0)/1000).toFixed(1)}s <span>análisis</span>
                                    </div>
                                )}
                                {results && (Number(results.cost_usd||0))>0 && (
                                    <div className="a-meta-item">
                                        ${Number(results.cost_usd||0).toFixed(3)} <span>costo</span>
                                    </div>
                                )}
                            </div>

                            <div style={{textAlign:'center',display:'flex',gap:'8px',justifyContent:'center',marginTop:'8px'}}>
                                <button className="reset-btn" onClick={handleReset}>Nuevo Análisis</button>
                                <button className="reset-btn share-btn" onClick={()=>{
                                    try{
                                        const brief=SafeText(ib.headline||`${dir} ${SafeText(results && results.commodity)}`);
                                        const priceStr=price>0?`$${price.toLocaleString()}`:'';
                                        const txt=`METEORO X\n${brief}\n${priceStr}${priceStr?' (':''}${changePct>0?'+':''}${changePct}${priceStr?')%':'%'}\n`
                                            +(ib.summary?`\n${SafeText(ib.summary).slice(0,200)}\n`:'')
                                            +(ib.key_risk?`\n⚠ ${SafeText(ib.key_risk).slice(0,100)}\n`:'')
                                            +`\nmeteoro.io`;
                                        navigator.clipboard.writeText(txt).then(()=>{
                                            const btn=document.querySelector('.share-btn');
                                            if(btn){btn.textContent='Copiado ✓';setTimeout(()=>{btn.textContent='Compartir'},1500)}
                                        }).catch(()=>{});
                                    }catch(e){console.error('Share error',e)}
                                }}>Compartir</button>
                            </div>
                        </>
                    )}
                </>
            );
        }catch(renderErr){
            console.error('Results render error',renderErr);
            return(
                <div style={{padding:'20px',textAlign:'center'}}>
                    <div style={{color:'#ff6666',fontSize:'12px',fontFamily:'Share Tech Mono,monospace',marginBottom:'12px'}}>
                        Error renderizando resultados
                    </div>
                    <div style={{color:'#556677',fontSize:'10px',fontFamily:'monospace',marginBottom:'12px'}}>
                        {SafeText(renderErr)}
                    </div>
                    <button className="reset-btn" onClick={handleReset}>Reintentar</button>
                </div>
            );
        }
    };

    return(
        <>
            {showPanel && (
                <div className="analysis-panel glass" ref={panelRef}>
                    {analyzing && (
                        <>
                            <div className="a-header">
                                <div className="a-dot"></div>
                                <span className="a-label">Analizando...</span>
                                <span className="a-timer">{elapsed}s</span>
                            </div>
                            <div className="phase-bar">
                                {['init','data','alpha','bravo','charlie','risk','consensus'].map((p,i)=>{
                                    const phaseList=['init','data','alpha','bravo','charlie','risk','consensus'];
                                    const phaseIdx=phaseList.indexOf(phase);
                                    const isDone=phaseIdx>i;
                                    const isActive=phase===p;
                                    return(
                                        <div key={p} className={`phase-dot ${isActive?'active':isDone?'done':'pending'}`}/>
                                    );
                                })}
                            </div>
                            <div className="a-steps" ref={stepsRef}>
                                {Array.isArray(steps) && steps.map((s,i)=>{
                                    const isLast=i===steps.length-1;
                                    const isRetry=String(s||'').includes('⟳');
                                    return(
                                        <div key={i} className={`a-step ${isLast?'now':'done'} ${isRetry?'retry':''}`}
                                            style={{opacity:isLast?1:Math.max(0.25,1-(steps.length-1-i)*0.06)}}>
                                            <div className={`a-icon ${isLast?'spin':'chk'}`}>{isLast?'':'✓'}</div>
                                            <div>{SafeText(s)}</div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="a-counter">{Array.isArray(steps)?steps.length:0} operaciones procesadas</div>
                        </>
                    )}

                    {error && !results && (
                        <>
                            <div style={{color:'#EF4444',fontSize:'12px',marginBottom:'12px',fontFamily:'Share Tech Mono,monospace'}}>
                                ⚠ ANALYSIS ERROR
                            </div>
                            <div style={{color:'#708090',fontSize:'12px',lineHeight:'1.6',marginBottom:'16px'}}>
                                {SafeText(error)}
                            </div>
                            <div style={{textAlign:'center'}}>
                                <button className="reset-btn" onClick={handleReset}>Reintentar</button>
                            </div>
                        </>
                    )}

                    {results && renderResults()}
                </div>
            )}

            {showChips && (
                <div className="chips-bar">
                    {chips.map((c,i)=><div key={i} className="chip" onClick={()=>handleSearch(c)}>{c}</div>)}
                </div>
            )}

            <div className="search-bar">
                <div className="search-wrap">
                    <input className="search-in" placeholder="¿Qué está pasando en los mercados?" value={input}
                        onChange={e=>setInput(e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSearch()}}}/>
                    <button className="search-btn" onClick={()=>handleSearch()}>↑</button>
                </div>
            </div>
        </>
    );
}

class ErrorBoundary extends React.Component{
    constructor(props){
        super(props);
        this.state={hasError:false,error:null,errorInfo:null,resetKey:0};
    }
    static getDerivedStateFromError(error){
        return {hasError:true,error:error};
    }
    componentDidCatch(error,errorInfo){
        console.error('ErrorBoundary caught:',error,errorInfo);
        this.setState({errorInfo:errorInfo});
    }
    render(){
        if(this.state.hasError){
            const errMsg=this.state.error?(typeof this.state.error==='object'?(this.state.error.message||this.state.error.toString()):(String(this.state.error))):'Unknown error';
            const stack=(this.state.errorInfo && this.state.errorInfo.componentStack)?this.state.errorInfo.componentStack:'';
