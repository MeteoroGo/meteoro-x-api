async function apiCall(path, options = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    ...options,
    headers: { ...headers, ...(options.headers || {}) },
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

function TickerBar({ tickers, connected, time }) {
  const items = tickers.map(t => {
    const cls = t.change > 0 ? "ticker-pos" : t.change < 0 ? "ticker-neg" : "ticker-neutral";
    const arrow = t.change > 0 ? "▲" : t.change < 0 ? "▼" : "";
    const pct = t.change !== null ? ` ${t.change > 0 ? '+' : ''}${t.change.toFixed(2)}%` : "";
    return `${t.name}: ${t.value}${pct ? ' ' + arrow + pct : ''}`;
  }).join("    ·    ");

  return (
    <div style={{
      overflow: "hidden", whiteSpace: "nowrap", fontSize: 11,
      borderBottom: `1px solid ${C.navyBorder}`, padding: "7px 0",
      fontFamily: "'JetBrains Mono', monospace", background: C.navy,
      display: "flex", alignItems: "center",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, paddingLeft: 12, paddingRight: 12, flexShrink: 0, borderRight: `1px solid ${C.navyBorder}` }}>
        <div style={{ width: 6, height: 6, borderRadius: "50%", background: connected ? C.green : C.amber, animation: connected ? "none" : "pulse 2s infinite" }} />
      </div>
      <div style={{ overflow: "hidden", flex: 1 }}>
        <div style={{ display: "inline-block", animation: "tickScroll 40s linear infinite", color: C.grey }}>
          {items}    ·    {items}
        </div>
      </div>
      <div style={{ paddingRight: 12, paddingLeft: 12, flexShrink: 0, color: C.greyDark, borderLeft: `1px solid ${C.navyBorder}` }}>
        {time}
      </div>
    </div>
  );
}

        fontSize: 13, fontWeight: active ? 500 : 400,
      }}>{label}</span>
    </div>
  );
}

function ConvictionGauge({ value, size = 80 }) {
  const r = 36;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (value / 100) * circumference;
  const color = value >= 70 ? C.cyan : value >= 40 ? C.amber : C.red;

  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} viewBox="0 0 80 80">
        <circle cx="40" cy="40" r={r} fill="none" stroke={C.navyBorder} strokeWidth="5" />
        <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="5"
          strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset}
          transform="rotate(-90 40 40)" style={{ animation: "convictionFill 1.2s ease-out", transition: "stroke-dashoffset 0.8s ease" }} />
      </svg>
      <div style={{
        position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
        textAlign: "center",
      }}>
        <div style={{ fontSize: 20, fontWeight: 800, color, fontFamily: "'JetBrains Mono', monospace" }}>{value}</div>
        <div style={{ fontSize: 8, color: C.greyDark, textTransform: "uppercase", letterSpacing: 1 }}>%</div>
      </div>
    </div>
  );
}

function RiskBar({ assessment }) {
  if (!assessment) return null;
  const items = [];
  if (assessment.var_1d !== undefined) items.push({ l: "VaR 1d", v: `${(assessment.var_1d * 100).toFixed(1)}%` });
  if (assessment.max_drawdown !== undefined) items.push({ l: "Max DD", v: `${(assessment.max_drawdown * 100).toFixed(1)}%` });
  if (assessment.depth !== undefined) items.push({ l: "Profundidad", v: `$${Number(assessment.depth).toLocaleString()}` });
  if (assessment.volume_24h !== undefined) items.push({ l: "Volumen 24h", v: `$${Number(assessment.volume_24h).toLocaleString()}` });
  if (assessment.spread_cost !== undefined) items.push({ l: "Spread", v: `${(assessment.spread_cost * 100).toFixed(2)}%` });
  if (assessment.veto !== undefined) items.push({ l: "Veto", v: assessment.veto ? "⛔ VETADO" : "✓ Despejado" });

  if (!items.length) return null;

  return (
    <div style={{
      marginTop: 14, padding: 16, background: C.navyLight, borderRadius: 10,
      border: `1px solid ${C.navyBorder}`, display: "flex", gap: 16, flexWrap: "wrap",
      justifyContent: "space-around",
    }}>
      {items.map(i => (
        <div key={i.l} style={{ textAlign: "center" }}>
          <div style={{ color: C.greyDark, fontSize: 9, textTransform: "uppercase", letterSpacing: 1 }}>{i.l}</div>
          <div style={{ color: C.white, fontSize: 13, fontFamily: "'JetBrains Mono', monospace", marginTop: 4 }}>{i.v}</div>
        </div>
      ))}
    </div>
  );
}

        // From FRED snapshot
        const vix = snap.VIXCLS || snap.VIX;
        if (vix) newTickers.push({ name: "VIX", value: Number(vix.value).toFixed(2), change: null });
        const dxy = snap.DTWEXBGS || snap.DXY;
        if (dxy) newTickers.push({ name: "DXY", value: Number(dxy.value).toFixed(2), change: null });

        if (newTickers.length > 0) setTickers(newTickers);
      } catch {}
    }
    init();

    // Update clock
    const clockId = setInterval(() => {
      setTime(new Date().toLocaleTimeString("en-US", { hour12: false, timeZone: "UTC" }) + " UTC");
    }, 1000);
    return () => clearInterval(clockId);
  }, []);

  const STEPS = [
    "Clasificando comando y routing a capacidades...",
    "Escaneando datos satelitales térmicos (NASA FIRMS)...",
    "Cruzando patrones marítimos AIS...",
    "Analizando régimen macro y dinámica de precios...",
    "Procesando inteligencia geopolítica GDELT...",
    "Sintetizando señal de consenso...",
  ];

  async function run(cmd) {
    setState("analyzing");
    setCommand(cmd);
    setProgress([]);
    setResult(null);
    setError(null);

    // Run progress animation and API call IN PARALLEL
    const progressPromise = (async () => {
      for (let i = 0; i < STEPS.length; i++) {
        setProgress(p => [...p, { label: STEPS[i], done: false, active: true }]);
        await new Promise(r => setTimeout(r, 1500 + Math.random() * 2500));
        setProgress(p => p.map((s, j) => j === i ? { ...s, done: true, active: false } : s));
      }
    })();

    const apiPromise = (async () => {
      try {
        if (connected) {
          return await api.analyze(cmd);
        } else {
          await new Promise(r => setTimeout(r, 3000));
          return { ...MOCK, command: cmd };
        }
      } catch (e) {
        console.error("API error:", e);
        return { ...MOCK, command: cmd };
      }
    })();

    // Wait for BOTH to complete
    const [, apiResult] = await Promise.all([progressPromise, apiPromise]);

    // Ensure all steps show as done
    setProgress(p => p.map(s => ({ ...s, done: true, active: false })));
    await new Promise(r => setTimeout(r, 400));

    setResult(apiResult);
    setState("result");
  }

  function reset() {
    setState("landing");
    setCommand("");
    setResult(null);
    setProgress([]);
    setError(null);
    setTimeout(() => inputRef.current?.focus(), 100);
  }

  return (
    <div style={{ minHeight: "100vh" }}>
      <TickerBar tickers={tickers} connected={connected} time={time} />

      {/* ── LANDING ── */}
      {state === "landing" && (
        <div style={{
          display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", minHeight: "calc(100vh - 80px)",
          padding: "0 20px", animation: "fadeIn 0.5s ease",
        }}>
          <div style={{ marginBottom: 48, textAlign: "center" }}>
            <h1 style={{
              fontSize: 42, fontWeight: 800, letterSpacing: -2, color: C.white,
              lineHeight: 1,
            }}>
              METEORO <span style={{ color: C.cyan }}>X</span>
            </h1>
            <p style={{
              color: C.greyDark, fontSize: 11, letterSpacing: 3,
              textTransform: "uppercase", marginTop: 8,
            }}>
              Agentic Intelligence System
            </p>
          </div>

          <form onSubmit={e => { e.preventDefault(); if (command.trim()) run(command.trim()); }}
            style={{ width: "100%", maxWidth: 620 }}>
            <div style={{ position: "relative" }}>
              <input
                ref={inputRef} value={command} onChange={e => setCommand(e.target.value)}
                placeholder="¿Qué está pasando en los mercados?" autoFocus
                style={{
                  width: "100%", padding: "18px 54px 18px 22px", fontSize: 15,
                  background: C.navyLight, border: `1px solid ${C.navyBorder}`,
                  borderRadius: 14, color: C.white, outline: "none",
                  fontFamily: "'Inter', sans-serif", transition: "border-color 0.2s",
                }}
                onFocus={e => e.target.style.borderColor = C.cyan}
                onBlur={e => e.target.style.borderColor = C.navyBorder}
              />
              <button type="submit" disabled={!command.trim()} style={{
                position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)",
                background: command.trim() ? C.cyan : C.greyDarker,
                border: "none", borderRadius: 10, width: 36, height: 36,
                cursor: command.trim() ? "pointer" : "default",
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "background 0.2s",
              }}>
                <span style={{ color: C.bg, fontSize: 18, fontWeight: 700 }}>↑</span>
              </button>
            </div>
          </form>

          <div style={{ display: "flex", gap: 8, marginTop: 18, flexWrap: "wrap", justifyContent: "center" }}>
            {SUGGESTIONS.map(s => (
              <button key={s} onClick={() => { setCommand(s); run(s); }} style={{
                background: "transparent", border: `1px solid ${C.navyBorder}`,
                color: C.greyDark, padding: "9px 16px", borderRadius: 22,
                cursor: "pointer", fontSize: 12, transition: "all 0.2s",
              }}
                onMouseEnter={e => { e.target.style.borderColor = C.cyan; e.target.style.color = C.cyan; }}
                onMouseLeave={e => { e.target.style.borderColor = C.navyBorder; e.target.style.color = C.greyDark; }}>
                {s}
              </button>
            ))}
          </div>

          <div style={{ marginTop: 32, display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{
              width: 7, height: 7, borderRadius: "50%",
              background: connected ? C.green : C.amber,
              animation: connected ? "none" : "pulse 2s infinite",
            }} />
            <span style={{ color: C.greyDark, fontSize: 11 }}>
              {connected ? `Backend conectado · ${signalCount} señales generadas` : "Modo demo — backend no disponible"}
            </span>
          </div>
        </div>
      )}

      {/* ── ANALYZING ── */}
      {state === "analyzing" && (
        <div style={{
          maxWidth: 640, margin: "0 auto", padding: "50px 20px",
          animation: "fadeIn 0.3s ease",
        }}>
          <div style={{ marginBottom: 28 }}>
            <span style={{ color: C.greyDark, fontSize: 11, textTransform: "uppercase", letterSpacing: 2 }}>Analizando</span>
            <h2 style={{ color: C.white, fontSize: 19, fontWeight: 600, marginTop: 6, lineHeight: 1.4 }}>{command}</h2>
          </div>

          <div style={{
            background: C.navyLight, borderRadius: 14, padding: 24,
            border: `1px solid ${C.navyBorder}`, animation: "glow 3s ease-in-out infinite",
          }}>
            <div style={{
              display: "flex", alignItems: "center", gap: 10, marginBottom: 18,
              paddingBottom: 14, borderBottom: `1px solid ${C.navyBorder}`,
            }}>
              <div style={{
                width: 8, height: 8, borderRadius: "50%", background: C.cyan,
                animation: "pulse 1.2s infinite",
              }} />
              <span style={{ color: C.cyan, fontSize: 13, fontWeight: 600 }}>
                Meteoro está analizando...
              </span>
              <span style={{ color: C.greyDark, fontSize: 11, marginLeft: "auto", fontFamily: "'JetBrains Mono', monospace" }}>
                {connected ? "LIVE" : "DEMO"}
              </span>
            </div>
            {progress.map((s, i) => (
              <ProgressStep key={i} label={s.label} done={s.done} active={s.active} index={i} />
            ))}
          </div>
        </div>
      )}

      {/* ── RESULT ── */}
      {state === "result" && result && (
        <div style={{
          maxWidth: 720, margin: "0 auto", padding: "30px 20px 100px",
          animation: "fadeIn 0.5s ease",
        }}>
          <button onClick={reset} style={{
            background: "none", border: `1px solid ${C.navyBorder}`, color: C.grey,
            cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center",
            gap: 6, marginBottom: 20, padding: "8px 14px", borderRadius: 8,
            transition: "border-color 0.2s",
          }}
            onMouseEnter={e => e.target.style.borderColor = C.cyan}
            onMouseLeave={e => e.target.style.borderColor = C.navyBorder}>
            ← Nuevo análisis
          </button>

          <div style={{ marginBottom: 24 }}>
            <span style={{ color: C.greyDark, fontSize: 10, textTransform: "uppercase", letterSpacing: 2 }}>Análisis completado</span>
            <h2 style={{ color: C.white, fontSize: 21, fontWeight: 700, marginTop: 6, lineHeight: 1.3 }}>{result.command}</h2>
          </div>

          {/* Completion indicator */}
          <div style={{
            display: "flex", alignItems: "center", gap: 8, marginBottom: 16,
            padding: "10px 16px", background: C.navyLight, borderRadius: 10,
            border: `1px solid ${C.greenDim || C.navyBorder}`,
          }}>
            <span style={{ color: C.green, fontSize: 14 }}>✓</span>
            <span style={{ color: C.grey, fontSize: 13 }}>Meteoro terminó de analizar</span>
            <span style={{ marginLeft: "auto", color: C.greyDark, fontSize: 11, fontFamily: "'JetBrains Mono', monospace" }}>
              {result.pipeline_latency_ms ? `${(result.pipeline_latency_ms / 1000).toFixed(1)}s` : ""}
            </span>
          </div>

          {/* Narrative */}
          <div style={{
            background: C.navyLight, borderRadius: 14, padding: 22,
            border: `1px solid ${C.navyBorder}`, marginBottom: 4,
          }}>
            <p style={{ color: C.white, fontSize: 14, lineHeight: 1.75 }}>{result.what_happened}</p>
            {result.why_it_matters && (
              <p style={{ color: C.grey, fontSize: 13, lineHeight: 1.65, marginTop: 14 }}>{result.why_it_matters}</p>
            )}
            {result.signal && result.signal.reasoning && (
              <p style={{ color: C.greyDark, fontSize: 13, lineHeight: 1.6, marginTop: 12, fontStyle: "italic" }}>
                {result.signal.reasoning}
              </p>
            )}
          </div>

          <ExecCard signal={result.signal} />
          <RiskBar assessment={result.risk_assessment} />
          <EvidenceCards cards={result.evidence_cards} />
          <CausalChain chain={result.causal_chain} />

          {/* Execute button */}
          {result.signal && result.signal.direction !== "ESPERAR" && result.signal.direction !== "NEUTRAL" && (
            <button style={{
              width: "100%", marginTop: 24, padding: "16px 0",
              background: `linear-gradient(135deg, ${C.cyan}, ${C.green})`,
              border: "none", borderRadius: 12, color: C.bg, fontSize: 14,
              fontWeight: 700, letterSpacing: 2, cursor: "pointer",
              textTransform: "uppercase", transition: "opacity 0.2s",
            }}
              onMouseEnter={e => e.target.style.opacity = "0.9"}
              onMouseLeave={e => e.target.style.opacity = "1"}>
              EJECUTAR OPERACIÓN
            </button>
          )}

          {/* Pack metadata */}
          <div style={{
            marginTop: 20, padding: 16, background: C.navyLight, borderRadius: 10,
            border: `1px solid ${C.navyBorder}`, display: "grid",
            gridTemplateColumns: "1fr 1fr", gap: 10,
          }}>
            <div>
              <span style={{ color: C.greyDark, fontSize: 9, textTransform: "uppercase", letterSpacing: 1 }}>Pack ID</span>
              <div style={{ color: C.grey, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", marginTop: 3 }}>{result.pack_id}</div>
            </div>
            <div>
              <span style={{ color: C.greyDark, fontSize: 9, textTransform: "uppercase", letterSpacing: 1 }}>Latencia</span>
              <div style={{ color: C.grey, fontSize: 11, fontFamily: "'JetBrains Mono', monospace", marginTop: 3 }}>{result.pipeline_latency_ms}ms</div>
            </div>
            <div style={{ gridColumn: "1 / -1" }}>
              <span style={{ color: C.greyDark, fontSize: 9, textTransform: "uppercase", letterSpacing: 1 }}>SHA-256</span>
              <div style={{ color: C.greyDark, fontSize: 10, fontFamily: "'JetBrains Mono', monospace", marginTop: 3, wordBreak: "break-all" }}>{result.pack_hash}</div>
            </div>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0, textAlign: "center",
        padding: "12px 0", background: `linear-gradient(transparent, ${C.bg})`,
        pointerEvents: "none",
      }}>
        <span style={{ color: C.greyDarker, fontSize: 10, letterSpacing: 1 }}>
          METEORO X · v8.0 · Agentic Intelligence System
        </span>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
