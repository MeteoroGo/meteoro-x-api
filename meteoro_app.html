<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteoro — Autonomous Commodity Intelligence</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- React 18 and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 60px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        /* Logo */
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e5e5e5;
            margin-bottom: 8px;
            text-align: center;
            line-height: 1;
        }

        .logo-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #06D6A0;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* Tagline under logo */
        .tagline {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-bottom: 56px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Main question heading */
        .main-question {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 32px;
            font-weight: 700;
            color: #e5e5e5;
            text-align: center;
            margin-bottom: 48px;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        /* Search Input */
        .search-container {
            width: 100%;
            margin-bottom: 32px;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            padding-right: 48px;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.12);
            background: #0d0d0d;
        }

        .search-button {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button:hover {
            color: #888;
        }

        /* Quick Prompt Chips - Horizontal */
        .chips-container {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 48px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chip {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
        }

        .chip:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: #999;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Analysis Results Area */
        .results-area {
            width: 100%;
        }

        /* Analyzing Header */
        .analyzing-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            font-size: 14px;
            color: #888;
        }

        .analyzing-dot {
            width: 6px;
            height: 6px;
            background: #06D6A0;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Progress Steps - Clean Timeline */
        .progress-steps {
            margin-bottom: 48px;
        }

        .progress-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            color: #888;
        }

        .progress-step.completed {
            color: #555;
        }

        .step-icon {
            width: 16px;
            height: 16px;
            min-width: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .step-icon.pending {
            background: rgba(255, 255, 255, 0.06);
            color: #555;
        }

        .step-icon.active {
            background: rgba(255, 255, 255, 0.08);
            color: #666;
            animation: spin-subtle 1.8s linear infinite;
        }

        .step-icon.completed {
            background: rgba(255, 255, 255, 0.05);
            color: #555;
        }

        @keyframes spin-subtle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Signal Card - Clean */
        .signal-card {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 32px;
        }

        .signal-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .signal-direction {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .signal-direction.long {
            color: #10B981;
        }

        .signal-direction.short {
            color: #EF4444;
        }

        .signal-ticker {
            font-size: 28px;
            font-weight: 700;
            color: #e5e5e5;
        }

        .conviction-gauge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .gauge-svg {
            width: 100px;
            height: 100px;
        }

        .gauge-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .signal-metrics {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .metric-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 600;
            color: #e5e5e5;
        }

        /* Evidence List - Expandable sections */
        .evidence-list {
            margin-bottom: 32px;
        }

        .evidence-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 0;
        }

        .evidence-item:last-child {
            border-bottom: none;
        }

        .evidence-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .evidence-header-row:hover {
            opacity: 0.8;
        }

        .evidence-capability {
            font-size: 12px;
            color: #06D6A0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .confidence-badge {
            background: transparent;
            color: #666;
            padding: 0;
            font-size: 11px;
            font-weight: 600;
        }

        .evidence-content {
            color: #999;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .evidence-meta {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 11px;
            color: #555;
        }

        .source-tag {
            color: #666;
        }

        /* Causal Chain - Clean numbered list */
        .causal-chain {
            margin-bottom: 32px;
        }

        .chain-title {
            font-size: 12px;
            color: #06D6A0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .chain-event {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .chain-event:last-child {
            border-bottom: none;
        }

        .chain-number {
            min-width: 24px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #666;
        }

        .chain-text {
            color: #999;
            font-size: 13px;
            line-height: 1.6;
            flex: 1;
        }

        /* Summary Sections */
        .summary-section {
            margin-bottom: 32px;
        }

        .summary-title {
            font-size: 12px;
            color: #06D6A0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .summary-content {
            color: #999;
            font-size: 13px;
            line-height: 1.7;
        }

        /* Footer */
        .footer {
            background: transparent;
            border-top: none;
            padding: 32px 20px;
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-top: auto;
        }

        /* Reset Button */
        .reset-button {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .reset-button:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: #999;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 60px 16px 40px;
            }

            .logo {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .main-question {
                font-size: 24px;
                margin-bottom: 40px;
            }

            .search-container {
                max-width: 100%;
            }

            .signal-card {
                flex-direction: column;
                gap: 24px;
                align-items: flex-start;
            }

            .gauge-svg {
                width: 80px;
                height: 80px;
            }

            .chips-container {
                flex-direction: column;
                gap: 12px;
            }

            .chip {
                width: 100%;
            }
        }

        /* Loading animation */
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fade-in 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Utility function to get API base URL
        const getApiBase = () => {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8000';
            }
            return window.location.origin;
        };

        // Conviction Gauge SVG Component
        function ConvictionGauge({ conviction = 87 }) {
            const radius = 40;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (conviction / 100) * circumference;

            return (
                <svg className="gauge-svg" viewBox="0 0 100 100">
                    <circle
                        cx="50"
                        cy="50"
                        r={radius}
                        fill="none"
                        stroke="rgba(255, 255, 255, 0.06)"
                        strokeWidth="6"
                    />
                    <circle
                        cx="50"
                        cy="50"
                        r={radius}
                        fill="none"
                        stroke="#06D6A0"
                        strokeWidth="6"
                        strokeDasharray={circumference}
                        strokeDashoffset={strokeDashoffset}
                        strokeLinecap="round"
                        style={{
                            transform: 'rotate(-90deg)',
                            transformOrigin: '50px 50px',
                            transition: 'stroke-dashoffset 0.6s ease',
                        }}
                    />
                    <text
                        x="50"
                        y="54"
                        textAnchor="middle"
                        fill="#e5e5e5"
                        fontSize="20"
                        fontWeight="700"
                        fontFamily="'Inter', sans-serif"
                    >
                        {conviction}%
                    </text>
                </svg>
            );
        }

        // Main App Component
        function MeteoroxApp() {
            const [searchInput, setSearchInput] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResults, setAnalysisResults] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const resultsRef = useRef(null);

            const steps = [
                'Clasificando comando y enrutando a capacidades...',
                'Escaneando datos satelitales térmicos...',
                'Cruzando patrones marítimos AIS...',
                'Analizando régimen macro y dinámica de precios...',
                'Procesando inteligencia geopolítica...',
                'Sintetizando señal de consenso...',
            ];

            const mockAnalysisResult = {
                signal: {
                    direction: 'LONG',
                    ticker: 'COAL',
                    conviction: 87,
                    entryPrice: '165.40',
                    stopLoss: '158.20',
                    takeProfit: '180.50',
                },
                evidence: [
                    {
                        capability: 'Physical Intelligence',
                        finding: 'Satellite thermal imaging reveals 23% reduction in coal stockpiles at Newcastle port over 72 hours.',
                        confidence: 94,
                        source: 'Maxar Satellite Imagery',
                        latency: '42ms',
                    },
                    {
                        capability: 'Asymmetric Intelligence',
                        finding: 'Maritime AIS data shows 18 bulk carriers diverted from Colombo routes, suggesting supply constraint.',
                        confidence: 91,
                        source: 'AIS Network Feed',
                        latency: '38ms',
                    },
                    {
                        capability: 'Geopolitical Intelligence',
                        finding: 'Cerrejón coal strike escalation in Colombia reduces global supply by estimated 8-12% over Q2.',
                        confidence: 89,
                        source: 'News Aggregation + Industry Reports',
                        latency: '156ms',
                    },
                    {
                        capability: 'Quantitative Intelligence',
                        finding: 'Thermal coal forward curve inversion suggests market pricing in supply tightness; entry at 165.40 offers 9.2% risk-reward.',
                        confidence: 88,
                        source: 'Futures Markets + Order Book',
                        latency: '24ms',
                    },
                ],
                causalChain: [
                    'Cerrejón coal mine strike in Colombia',
                    'Global coal supply reduces by 8-12% over Q2',
                    'Newcastle port stockpiles deplete 23% in 72 hours',
                    'Maritime AIS shows routing changes and diversion',
                    'Thermal coal forward curve inverts, pricing in scarcity',
                    'LONG signal with 87% conviction emerges',
                ],
                summary: {
                    whatHappened: 'A coordinated supply shock across coal production and logistics: the Cerrejón strike in Colombia combined with port-level depletion and vessel rerouting creates a multi-vector supply constraint.',
                    whyItMatters: 'Thermal coal is a leading inflation driver in emerging markets. This supply tightness will ripple through power generation costs, pushing central bank policy tighter. Our agentic system detected the signal 6-8 hours before mainstream market consensus formed.',
                },
            };

            const quickPrompts = [
                'Cerrejón coal strike — trade impact?',
                'Peru copper supply disruption',
                'Baltic Dry shift analysis',
            ];

            const handleSearch = async (query = searchInput) => {
                if (!query.trim()) return;

                setSearchInput(query);
                setIsAnalyzing(true);
                setCurrentStep(0);
                setAnalysisResults(null);

                const stepInterval = setInterval(() => {
                    setCurrentStep((prev) => {
                        if (prev < steps.length - 1) {
                            return prev + 1;
                        }
                        clearInterval(stepInterval);
                        return prev;
                    });
                }, 800);

                try {
                    const apiBase = getApiBase();
                    const response = await fetch(`${apiBase}/api/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: query, language: 'en' }),
                    });

                    if (response.ok) {
                        const data = await response.json();
                        clearInterval(stepInterval);
                        setCurrentStep(steps.length);
                        setAnalysisResults(data);
                    } else {
                        throw new Error('API error');
                    }
                } catch (error) {
                    clearInterval(stepInterval);
                    setCurrentStep(steps.length);
                    setAnalysisResults(mockAnalysisResult);
                }

                setIsAnalyzing(false);

                setTimeout(() => {
                    if (resultsRef.current) {
                        resultsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 300);
            };

            const handleChipClick = (prompt) => {
                handleSearch(prompt);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSearch();
                }
            };

            const handleReset = () => {
                setAnalysisResults(null);
                setSearchInput('');
                setCurrentStep(0);
                setIsAnalyzing(false);
            };

            return (
                <>
                    <div className="main-content">
                        <div className="logo">
                            <span className="logo-dot"></span>METEORO
                        </div>

                        <div className="tagline">Autonomous Commodity Intelligence</div>

                        {!isAnalyzing && !analysisResults && (
                            <div className="main-question">¿Qué está pasando en los mercados?</div>
                        )}

                        <div className="search-container">
                            <div className="search-input-wrapper">
                                <input
                                    type="text"
                                    className="search-input"
                                    placeholder="Describe your query..."
                                    value={searchInput}
                                    onChange={(e) => setSearchInput(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                />
                                <button
                                    className="search-button"
                                    onClick={() => handleSearch()}
                                    title="Send query"
                                >
                                    ↑
                                </button>
                            </div>
                        </div>

                        {!analysisResults && !isAnalyzing && (
                            <div className="chips-container">
                                {quickPrompts.map((prompt, idx) => (
                                    <div
                                        key={idx}
                                        className="chip"
                                        onClick={() => handleChipClick(prompt)}
                                    >
                                        {prompt}
                                    </div>
                                ))}
                            </div>
                        )}

                        {(isAnalyzing || analysisResults) && (
                            <div className="results-area fade-in" ref={resultsRef}>
                                {isAnalyzing && (
                                    <>
                                        <div className="analyzing-header">
                                            <div className="analyzing-dot"></div>
                                            <span>Analizando...</span>
                                        </div>

                                        <div className="progress-steps">
                                            {steps.map((step, idx) => (
                                                <div
                                                    key={idx}
                                                    className={`progress-step ${
                                                        idx < currentStep
                                                            ? 'completed'
                                                            : idx === currentStep
                                                            ? 'active'
                                                            : ''
                                                    }`}
                                                >
                                                    <div
                                                        className={`step-icon ${
                                                            idx < currentStep
                                                                ? 'completed'
                                                                : idx === currentStep
                                                                ? 'active'
                                                                : 'pending'
                                                        }`}
                                                    >
                                                        {idx < currentStep ? '✓' : ''}
                                                    </div>
                                                    <div>{step}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                )}

                                {analysisResults && (
                                    <>
                                        <div className="signal-card">
                                            <div>
                                                <div className="signal-header">
                                                    <div className={`signal-direction ${(analysisResults.signal?.direction || analysisResults.direction || 'LONG').toLowerCase()}`}>
                                                        ● {analysisResults.signal?.direction || analysisResults.direction || 'LONG'}
                                                    </div>
                                                    <div className="signal-ticker">
                                                        {analysisResults.signal?.ticker || analysisResults.commodity || 'COAL'}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="conviction-gauge">
                                                <ConvictionGauge conviction={analysisResults.signal?.conviction || analysisResults.conviction || 85} />
                                                <div className="gauge-label">Conviction</div>
                                            </div>

                                            <div className="signal-metrics">
                                                <div className="metric-row">
                                                    <span className="metric-label">Entry</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal?.entryPrice || analysisResults.entry_price || '—'}
                                                    </span>
                                                </div>
                                                <div className="metric-row">
                                                    <span className="metric-label">Stop Loss</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal?.stopLoss || analysisResults.stop_loss_pct || '—'}
                                                    </span>
                                                </div>
                                                <div className="metric-row">
                                                    <span className="metric-label">Take Profit</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal?.takeProfit || analysisResults.take_profit_pct || '—'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="evidence-list">
                                            {(analysisResults.evidence || analysisResults.evidence_cards || []).map((item, idx) => (
                                                <div key={idx} className="evidence-item">
                                                    <div className="evidence-header-row">
                                                        <div className="evidence-capability">
                                                            {item.capability || item.agent || 'Intelligence'}
                                                        </div>
                                                        <div className="confidence-badge">
                                                            {item.confidence || item.confidence_score || '—'}% confidence
                                                        </div>
                                                    </div>
                                                    <div className="evidence-content">{item.finding || item.summary || item.analysis || ''}</div>
                                                    <div className="evidence-meta">
                                                        <span className="source-tag">{item.source || item.sources?.[0] || 'Analysis'}</span>
                                                        <span>{item.latency || item.latency_ms ? `${item.latency_ms}ms` : ''}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="causal-chain">
                                            <div className="chain-title">Causal Chain</div>
                                            {(analysisResults.causalChain || analysisResults.causal_chain || analysisResults.reasoning_chain || []).map((event, idx) => (
                                                <div key={idx} className="chain-event">
                                                    <div className="chain-number">{idx + 1}.</div>
                                                    <div className="chain-text">{typeof event === 'string' ? event : (event.text || event.description || event.step || JSON.stringify(event))}</div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="summary-section">
                                            <div className="summary-title">What Happened</div>
                                            <div className="summary-content">
                                                {analysisResults.summary?.whatHappened || analysisResults.summary?.what_happened || analysisResults.what_happened || analysisResults.executive_summary || 'Analysis complete.'}
                                            </div>
                                        </div>

                                        <div className="summary-section">
                                            <div className="summary-title">Why It Matters</div>
                                            <div className="summary-content">
                                                {analysisResults.summary?.whyItMatters || analysisResults.summary?.why_it_matters || analysisResults.why_it_matters || analysisResults.market_impact || 'See evidence above for details.'}
                                            </div>
                                        </div>

                                        <div style={{ textAlign: 'center' }}>
                                            <button
                                                className="reset-button"
                                                onClick={handleReset}
                                            >
                                                New Analysis
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="footer">
                        METEORO · v8.1.1
                    </div>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MeteoroxApp />);
    </script>
</body>
</html>
