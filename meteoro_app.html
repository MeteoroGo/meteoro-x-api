<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteoro — Autonomous Commodity Intelligence</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- React 18 and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 60px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
        }

        /* Logo */
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #e5e5e5;
            margin-bottom: 8px;
            text-align: center;
            line-height: 1;
        }

        .logo-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #06D6A0;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* Tagline under logo */
        .tagline {
            color: #888;
            font-size: 11px;
            text-align: center;
            margin-bottom: 56px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Main question heading */
        .main-question {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 32px;
            font-weight: 700;
            color: #e5e5e5;
            text-align: center;
            margin-bottom: 48px;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }

        /* Search Input */
        .search-container {
            width: 100%;
            margin-bottom: 32px;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            color: #e5e5e5;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            padding-right: 48px;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.12);
            background: #0d0d0d;
        }

        .search-button {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button:hover {
            color: #888;
        }

        /* Quick Prompt Chips - Horizontal */
        .chips-container {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 48px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chip {
            padding: 8px 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
        }

        .chip:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: #999;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Analysis Results Area */
        .results-area {
            width: 100%;
        }

        /* Analyzing Header */
        .analyzing-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 32px;
            font-size: 14px;
            color: #888;
        }

        .analyzing-dot {
            width: 6px;
            height: 6px;
            background: #06D6A0;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Progress Steps - Clean Timeline */

        .progress-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            color: #888;
        }

        .progress-step.completed {
            color: #555;
        }

        .step-icon {
            width: 16px;
            height: 16px;
            min-width: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .step-icon.pending {
            background: rgba(255, 255, 255, 0.06);
            color: #555;
        }

        .step-icon.active {
            background: rgba(255, 255, 255, 0.08);
            color: #666;
            animation: spin-subtle 1.8s linear infinite;
        }

        .step-icon.completed {
            background: rgba(255, 255, 255, 0.05);
            color: #555;
        }

        @keyframes spin-subtle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Signal Card - Clean */
        .signal-card {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 32px;
        }

        .signal-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .signal-direction {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .signal-direction.long {
            color: #10B981;
        }

        .signal-direction.short {
            color: #EF4444;
        }

        .signal-ticker {
            font-size: 28px;
            font-weight: 700;
            color: #e5e5e5;
        }

        .conviction-gauge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .gauge-svg {
            width: 100px;
            height: 100px;
        }

        .gauge-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .signal-metrics {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .metric-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 16px;
            font-weight: 600;
            color: #e5e5e5;
        }

        /* Analysis Narrative - LLM-style output */
        .analysis-narrative {
            margin-bottom: 32px;
        }

        .narrative-body {
            color: #c0c0c0;
            font-size: 14px;
            line-height: 1.8;
        }

        .narrative-body p {
            margin-bottom: 16px;
        }

        .narrative-body p:last-child {
            margin-bottom: 0;
        }

        .analysis-divider {
            width: 32px;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 28px 0;
        }

        .analysis-meta {
            display: flex;
            gap: 16px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .meta-item {
            font-size: 11px;
            color: #555;
            letter-spacing: 0.3px;
        }

        .meta-item span {
            color: #777;
        }

        /* Footer */
        .footer {
            background: transparent;
            border-top: none;
            padding: 32px 20px;
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-top: auto;
        }

        /* Reset Button */
        .reset-button {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 24px;
        }

        .reset-button:hover {
            border-color: rgba(255, 255, 255, 0.15);
            color: #999;
            background: rgba(255, 255, 255, 0.02);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                padding: 60px 16px 40px;
            }

            .logo {
                font-size: 36px;
                letter-spacing: 2px;
            }

            .main-question {
                font-size: 24px;
                margin-bottom: 40px;
            }

            .search-container {
                max-width: 100%;
            }

            .signal-card {
                flex-direction: column;
                gap: 24px;
                align-items: flex-start;
            }

            .gauge-svg {
                width: 80px;
                height: 80px;
            }

            .chips-container {
                flex-direction: column;
                gap: 12px;
            }

            .chip {
                width: 100%;
            }
        }

        /* Stream counter */
        .stream-counter {
            font-size: 11px;
            color: #06D6A0;
            margin-top: 12px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Auto-scroll progress area */
        .progress-steps {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin-bottom: 48px;
        }

        .progress-steps::-webkit-scrollbar {
            display: none;
        }

        /* Loading animation */
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fade-in 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Utility function to get API base URL
        const getApiBase = () => {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8000';
            }
            return window.location.origin;
        };

        // Conviction Gauge SVG Component
        function ConvictionGauge({ conviction = 87 }) {
            const radius = 40;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (conviction / 100) * circumference;

            return (
                <svg className="gauge-svg" viewBox="0 0 100 100">
                    <circle
                        cx="50"
                        cy="50"
                        r={radius}
                        fill="none"
                        stroke="rgba(255, 255, 255, 0.06)"
                        strokeWidth="6"
                    />
                    <circle
                        cx="50"
                        cy="50"
                        r={radius}
                        fill="none"
                        stroke="#06D6A0"
                        strokeWidth="6"
                        strokeDasharray={circumference}
                        strokeDashoffset={strokeDashoffset}
                        strokeLinecap="round"
                        style={{
                            transform: 'rotate(-90deg)',
                            transformOrigin: '50px 50px',
                            transition: 'stroke-dashoffset 0.6s ease',
                        }}
                    />
                    <text
                        x="50"
                        y="54"
                        textAnchor="middle"
                        fill="#e5e5e5"
                        fontSize="20"
                        fontWeight="700"
                        fontFamily="'Inter', sans-serif"
                    >
                        {conviction}%
                    </text>
                </svg>
            );
        }

        // Main App Component
        function MeteoroxApp() {
            const [searchInput, setSearchInput] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResults, setAnalysisResults] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const resultsRef = useRef(null);

            // Phase 1: Initial routing (shown once, fast)
            const initSteps = [
                'Clasificando consulta y activando sistema agéntico...',
            ];

            // Phase 2: Intelligence streams loop (cycles while waiting for API)
            const intelligenceStreams = [
                'Escaneando imágenes satelitales térmicas de producción...',
                'Analizando tráfico portuario y congestión en terminales...',
                'Cruzando patrones de rutas marítimas AIS en tiempo real...',
                'Procesando flujos de carga en corredores logísticos clave...',
                'Evaluando riesgo geopolítico en regiones productoras...',
                'Monitoreando inventarios y stockpiles en destinos principales...',
                'Correlacionando índices de flete con demanda spot...',
                'Rastreando movimientos de divisas en mercados emergentes...',
                'Analizando curva forward y estructura de precios futuros...',
                'Procesando señales de sentimiento en mercados de derivados...',
                'Evaluando impacto climático en zonas de extracción...',
                'Verificando datos de aduanas y volúmenes de exportación...',
                'Cruzando inteligencia de fuentes abiertas (OSINT) regionales...',
                'Analizando patrones de consumo energético industrial...',
                'Evaluando posiciones especulativas en mercados de commodities...',
                'Procesando alertas de disrupciones en cadena de suministro...',
                'Monitoreando flujos de capital institucional en el sector...',
                'Analizando correlaciones macro entre materias primas...',
                'Evaluando impacto de políticas regulatorias y aranceles...',
                'Sintetizando inteligencia de demanda asiática...',
            ];

            // Phase 3: Final synthesis (shown at end)
            const finalSteps = [
                'Convergiendo señales — construyendo consenso...',
                'Generando análisis autónomo...',
            ];

            // Combine into dynamic steps array with looping intelligence
            const [activeSteps, setActiveSteps] = useState([initSteps[0]]);
            const [streamIndex, setStreamIndex] = useState(0);
            const [phase, setPhase] = useState('init'); // init, scanning, finalizing, done

            const mockAnalysisResult = {
                signal: {
                    direction: 'LONG',
                    ticker: 'COAL',
                    conviction: 87,
                    entryPrice: '165.40',
                    stopLoss: '158.20',
                    takeProfit: '180.50',
                },
                evidence: [
                    {
                        capability: 'Physical Intelligence',
                        finding: 'Satellite thermal imaging reveals 23% reduction in coal stockpiles at Newcastle port over 72 hours.',
                        confidence: 94,
                        source: 'Maxar Satellite Imagery',
                        latency: '42ms',
                    },
                    {
                        capability: 'Asymmetric Intelligence',
                        finding: 'Maritime AIS data shows 18 bulk carriers diverted from Colombo routes, suggesting supply constraint.',
                        confidence: 91,
                        source: 'AIS Network Feed',
                        latency: '38ms',
                    },
                    {
                        capability: 'Geopolitical Intelligence',
                        finding: 'Cerrejón coal strike escalation in Colombia reduces global supply by estimated 8-12% over Q2.',
                        confidence: 89,
                        source: 'News Aggregation + Industry Reports',
                        latency: '156ms',
                    },
                    {
                        capability: 'Quantitative Intelligence',
                        finding: 'Thermal coal forward curve inversion suggests market pricing in supply tightness; entry at 165.40 offers 9.2% risk-reward.',
                        confidence: 88,
                        source: 'Futures Markets + Order Book',
                        latency: '24ms',
                    },
                ],
                causalChain: [
                    'Cerrejón coal mine strike in Colombia',
                    'Global coal supply reduces by 8-12% over Q2',
                    'Newcastle port stockpiles deplete 23% in 72 hours',
                    'Maritime AIS shows routing changes and diversion',
                    'Thermal coal forward curve inverts, pricing in scarcity',
                    'LONG signal with 87% conviction emerges',
                ],
                summary: {
                    whatHappened: 'A coordinated supply shock across coal production and logistics: the Cerrejón strike in Colombia combined with port-level depletion and vessel rerouting creates a multi-vector supply constraint.',
                    whyItMatters: 'Thermal coal is a leading inflation driver in emerging markets. This supply tightness will ripple through power generation costs, pushing central bank policy tighter. Our agentic system detected the signal 6-8 hours before mainstream market consensus formed.',
                },
            };

            // Auto-scroll progress steps to bottom when new items added
            const progressRef = useRef(null);
            useEffect(() => {
                if (progressRef.current) {
                    progressRef.current.scrollTop = progressRef.current.scrollHeight;
                }
            }, [activeSteps]);

            const quickPrompts = [
                'Cerrejón coal strike — trade impact?',
                'Peru copper supply disruption',
                'Baltic Dry shift analysis',
            ];

            const handleSearch = async (query = searchInput) => {
                if (!query.trim()) return;

                setSearchInput(query);
                setIsAnalyzing(true);
                setCurrentStep(0);
                setAnalysisResults(null);
                setPhase('init');
                setStreamIndex(0);

                // Shuffle intelligence streams for variety each time
                const shuffled = [...intelligenceStreams].sort(() => Math.random() - 0.5);
                setActiveSteps([initSteps[0]]);

                let stepCount = 0;
                let apiDone = false;
                let apiResult = null;

                // Animation loop — adds new intelligence streams every 1.2s
                const stepInterval = setInterval(() => {
                    if (apiDone) {
                        clearInterval(stepInterval);
                        return;
                    }
                    stepCount++;
                    if (stepCount <= shuffled.length) {
                        setActiveSteps(prev => [...prev, shuffled[stepCount - 1]]);
                        setCurrentStep(stepCount);
                        setPhase('scanning');
                    } else {
                        // Loop back through with different wording
                        const loopIdx = (stepCount - shuffled.length - 1) % shuffled.length;
                        const loopStep = shuffled[loopIdx].replace('...', ' — verificando...');
                        setActiveSteps(prev => [...prev, loopStep]);
                        setCurrentStep(stepCount);
                    }
                }, 1200);

                try {
                    const apiBase = getApiBase();
                    const response = await fetch(`${apiBase}/api/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: query, language: 'en' }),
                    });

                    apiDone = true;
                    clearInterval(stepInterval);

                    if (response.ok) {
                        const data = await response.json();
                        // Add final synthesis steps
                        setPhase('finalizing');
                        setActiveSteps(prev => [...prev, finalSteps[0]]);
                        setCurrentStep(prev => prev + 1);

                        await new Promise(r => setTimeout(r, 600));
                        setActiveSteps(prev => [...prev, finalSteps[1]]);
                        setCurrentStep(prev => prev + 1);

                        await new Promise(r => setTimeout(r, 800));
                        setPhase('done');
                        setAnalysisResults(data);
                    } else {
                        throw new Error('API error');
                    }
                } catch (error) {
                    apiDone = true;
                    clearInterval(stepInterval);
                    setPhase('finalizing');
                    setActiveSteps(prev => [...prev, finalSteps[0], finalSteps[1]]);
                    setCurrentStep(prev => prev + 2);
                    await new Promise(r => setTimeout(r, 800));
                    setPhase('done');
                    setAnalysisResults(mockAnalysisResult);
                }

                setIsAnalyzing(false);

                setTimeout(() => {
                    if (resultsRef.current) {
                        resultsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 300);
            };

            const handleChipClick = (prompt) => {
                handleSearch(prompt);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSearch();
                }
            };

            const handleReset = () => {
                setAnalysisResults(null);
                setSearchInput('');
                setCurrentStep(0);
                setIsAnalyzing(false);
            };

            return (
                <>
                    <div className="main-content">
                        <div className="logo">
                            <span className="logo-dot"></span>METEORO
                        </div>

                        <div className="tagline">Autonomous Commodity Intelligence</div>

                        {!isAnalyzing && !analysisResults && (
                            <div className="main-question">¿Qué está pasando en los mercados?</div>
                        )}

                        <div className="search-container">
                            <div className="search-input-wrapper">
                                <input
                                    type="text"
                                    className="search-input"
                                    placeholder="Describe your query..."
                                    value={searchInput}
                                    onChange={(e) => setSearchInput(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                />
                                <button
                                    className="search-button"
                                    onClick={() => handleSearch()}
                                    title="Send query"
                                >
                                    ↑
                                </button>
                            </div>
                        </div>

                        {!analysisResults && !isAnalyzing && (
                            <div className="chips-container">
                                {quickPrompts.map((prompt, idx) => (
                                    <div
                                        key={idx}
                                        className="chip"
                                        onClick={() => handleChipClick(prompt)}
                                    >
                                        {prompt}
                                    </div>
                                ))}
                            </div>
                        )}

                        {(isAnalyzing || analysisResults) && (
                            <div className="results-area fade-in" ref={resultsRef}>
                                {isAnalyzing && (
                                    <>
                                        <div className="analyzing-header">
                                            <div className="analyzing-dot"></div>
                                            <span>Analizando...</span>
                                        </div>

                                        <div className="progress-steps" ref={progressRef}>
                                            {activeSteps.map((step, idx) => {
                                                const isLast = idx === activeSteps.length - 1;
                                                const isCompleted = idx < activeSteps.length - 1;
                                                return (
                                                    <div
                                                        key={idx}
                                                        className={`progress-step ${isCompleted ? 'completed' : 'active'} fade-in`}
                                                        style={{ opacity: isCompleted ? Math.max(0.3, 1 - (activeSteps.length - 1 - idx) * 0.08) : 1 }}
                                                    >
                                                        <div className={`step-icon ${isCompleted ? 'completed' : 'active'}`}>
                                                            {isCompleted ? '✓' : ''}
                                                        </div>
                                                        <div>{step}</div>
                                                    </div>
                                                );
                                            })}
                                            {phase === 'scanning' && (
                                                <div className="stream-counter">
                                                    {activeSteps.length - 1} fuentes procesadas
                                                </div>
                                            )}
                                        </div>
                                    </>
                                )}

                                {analysisResults && (
                                    <>
                                        <div className="signal-card">
                                            <div>
                                                <div className="signal-header">
                                                    <div className={`signal-direction ${(analysisResults.signal?.direction || analysisResults.direction || 'LONG').toLowerCase()}`}>
                                                        ● {analysisResults.signal?.direction || analysisResults.direction || 'LONG'}
                                                    </div>
                                                    <div className="signal-ticker">
                                                        {analysisResults.signal?.ticker || analysisResults.commodity || 'COAL'}
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="conviction-gauge">
                                                <ConvictionGauge conviction={analysisResults.signal?.conviction || analysisResults.conviction || 85} />
                                                <div className="gauge-label">Conviction</div>
                                            </div>

                                            <div className="signal-metrics">
                                                <div className="metric-row">
                                                    <span className="metric-label">Entry</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal?.entryPrice || analysisResults.entry_price || '—'}
                                                    </span>
                                                </div>
                                                <div className="metric-row">
                                                    <span className="metric-label">Stop Loss</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal?.stopLoss || analysisResults.stop_loss_pct || '—'}
                                                    </span>
                                                </div>
                                                <div className="metric-row">
                                                    <span className="metric-label">Take Profit</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal?.takeProfit || analysisResults.take_profit_pct || '—'}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="analysis-narrative">
                                            <div className="narrative-body">
                                                {(() => {
                                                    const reasoning = analysisResults.signal?.reasoning || analysisResults.reasoning || analysisResults.why_it_matters || '';
                                                    const whatHappened = analysisResults.summary?.whatHappened || analysisResults.summary?.what_happened || analysisResults.what_happened || '';
                                                    const whyMatters = analysisResults.summary?.whyItMatters || analysisResults.summary?.why_it_matters || analysisResults.why_it_matters || '';

                                                    // Build narrative paragraphs from available data
                                                    const paragraphs = [];

                                                    if (whatHappened && whatHappened !== 'Analysis complete.') {
                                                        paragraphs.push(whatHappened);
                                                    }

                                                    if (reasoning) {
                                                        paragraphs.push(reasoning);
                                                    }

                                                    if (whyMatters && whyMatters !== 'See evidence above for details.' && whyMatters !== reasoning) {
                                                        paragraphs.push(whyMatters);
                                                    }

                                                    // If no structured content, synthesize from evidence_cards
                                                    if (paragraphs.length === 0) {
                                                        const cards = analysisResults.evidence || analysisResults.evidence_cards || [];
                                                        const validFindings = cards
                                                            .filter(c => (c.finding || c.summary || c.analysis || c.reasoning) && !(c.finding || c.summary || c.analysis || c.reasoning || '').includes('LLM providers unavailable'))
                                                            .map(c => c.finding || c.summary || c.analysis || c.reasoning);

                                                        if (validFindings.length > 0) {
                                                            paragraphs.push(...validFindings);
                                                        } else {
                                                            // Fallback: aggregate signal summary
                                                            const cards2 = analysisResults.evidence || analysisResults.evidence_cards || [];
                                                            const bullish = cards2.filter(c => (c.signal || '').toUpperCase() === 'LONG' || (c.signal || '').toUpperCase() === 'BUY').length;
                                                            const bearish = cards2.filter(c => (c.signal || '').toUpperCase() === 'SHORT' || (c.signal || '').toUpperCase() === 'SELL').length;
                                                            const neutral = cards2.length - bullish - bearish;
                                                            const dir = (analysisResults.signal?.action || analysisResults.signal?.direction || analysisResults.direction || 'HOLD').toUpperCase();
                                                            const conv = analysisResults.signal?.conviction || analysisResults.conviction || 0;
                                                            const commodity = analysisResults.signal?.ticker || analysisResults.commodity || 'the commodity';

                                                            paragraphs.push(
                                                                `Our autonomous analysis of ${commodity} processed ${cards2.length} intelligence streams across satellite imagery, maritime tracking, supply chain data, macro indicators, and geopolitical signals.`
                                                            );
                                                            paragraphs.push(
                                                                `The consensus signal is ${dir} with ${conv}% conviction. Out of ${cards2.length} independent analyses, ${bullish} returned bullish, ${bearish} bearish, and ${neutral} neutral readings${neutral === cards2.length ? ' — indicating that deeper data sources are being refreshed. Run this analysis again in a few minutes for full results.' : '.'}`
                                                            );
                                                        }
                                                    }

                                                    return paragraphs.map((p, i) => <p key={i}>{p}</p>);
                                                })()}
                                            </div>

                                            <div className="analysis-meta">
                                                <div className="meta-item">
                                                    {(analysisResults.evidence || analysisResults.evidence_cards || []).length} <span>intelligence streams</span>
                                                </div>
                                                {analysisResults.pipeline_latency_ms && (
                                                    <div className="meta-item">
                                                        {(analysisResults.pipeline_latency_ms / 1000).toFixed(1)}s <span>latency</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        <div style={{ textAlign: 'center' }}>
                                            <button
                                                className="reset-button"
                                                onClick={handleReset}
                                            >
                                                New Analysis
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="footer">
                        METEORO · v8.3
                    </div>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MeteoroxApp />);
    </script>
</body>
</html>
