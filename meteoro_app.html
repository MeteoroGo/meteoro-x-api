<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteoro X — Autonomous Commodity Intelligence</title>

    <!-- Globe.gl -->
    <script src="https://unpkg.com/globe.gl@2.27.2/dist/globe.gl.min.js"></script>

    <!-- React 18 + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: #000008;
            color: #e0e8f0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        /* ═══ GLOBE ═══ */
        #globeViz {
            position: fixed; inset: 0;
            z-index: 0;
            transition: filter 0.8s ease;
            animation: globe-in 2.5s ease-out;
        }
        @keyframes globe-in {
            from { opacity: 0; } to { opacity: 1; }
        }

        /* ═══ VISUAL MODES ═══ */
        body.nvg #globeViz { filter: saturate(0) brightness(0.5) contrast(1.4); }
        body.nvg .hud-panel { border-color: #00ff41 !important; }
        body.nvg .hud-panel, body.nvg .hud-val, body.nvg .hud-lbl,
        body.nvg .mode-btn, body.nvg #alert-text, body.nvg #logo-main,
        body.nvg #logo-sub { color: #00ff41 !important; }
        body.nvg .hud-val { text-shadow: 0 0 20px #00ff41 !important; }
        body.nvg #nvg-over, body.nvg #scanlines { display: block; }

        body.flir #globeViz { filter: saturate(1.8) contrast(1.5) hue-rotate(-15deg) brightness(0.7); }
        body.flir .hud-panel { border-color: #ff4400 !important; }
        body.flir .hud-val { color: #ff6600 !important; text-shadow: 0 0 20px #ff4400 !important; }
        body.flir #logo-main, body.flir #logo-sub { color: #ff6600 !important; }

        body.sat #globeViz { filter: brightness(1.15) contrast(1.1) saturate(0.7); }

        /* ═══ OVERLAYS ═══ */
        #vignette {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,8,0.7) 100%);
            pointer-events: none;
        }
        #nvg-over {
            display: none; position: fixed; inset: 0; z-index: 2;
            background: radial-gradient(ellipse at center, rgba(0,255,65,0.02) 0%, rgba(0,40,10,0.35) 100%);
            pointer-events: none; mix-blend-mode: screen;
        }
        #scanlines {
            display: none; position: fixed; inset: 0; z-index: 3;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.03) 2px, rgba(0,255,65,0.03) 4px);
            pointer-events: none; animation: scanmove 8s linear infinite;
        }
        @keyframes scanmove { to { transform: translateY(4px); } }

        /* ═══ HUD PANELS ═══ */
        .hud-panel {
            position: fixed;
            background: rgba(0,6,20,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0,180,255,0.15);
            z-index: 10;
            padding: 14px 18px;
            transition: border-color 0.5s, color 0.5s;
        }

        /* Logo — top left */
        #hud-logo { top: 20px; left: 20px; }
        #logo-main {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 20px; color: #fff;
            letter-spacing: 5px;
        }
        #logo-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #00b4ff; letter-spacing: 3px; margin-top: 3px;
        }
        #live-dot {
            display: inline-block; width: 7px; height: 7px;
            background: #ff0040; border-radius: 50%; margin-left: 10px;
            animation: livep 1.5s ease-in-out infinite; vertical-align: middle;
        }
        @keyframes livep { 0%,100%{opacity:1;box-shadow:0 0 8px #ff0040} 50%{opacity:0.3;box-shadow:0 0 2px #ff0040} }

        /* Modes — top right */
        #hud-modes { top: 20px; right: 20px; display: flex; gap: 2px; padding: 4px; }
        .mode-btn {
            background: transparent; border: 1px solid rgba(0,180,255,0.12);
            color: #506070; font-family: 'Share Tech Mono', monospace;
            font-size: 10px; padding: 7px 14px; cursor: pointer;
            letter-spacing: 2px; transition: all 0.3s;
        }
        .mode-btn:hover { color: #00b4ff; border-color: rgba(0,180,255,0.4); }
        .mode-btn.active {
            background: rgba(0,180,255,0.1); color: #00d4ff;
            border-color: #00b4ff; text-shadow: 0 0 10px rgba(0,180,255,0.5);
        }

        /* Alerts — top center */
        #hud-alerts {
            top: 20px; left: 50%; transform: translateX(-50%);
            max-width: 520px; width: 80vw; text-align: center;
            padding: 8px 18px; border-color: rgba(255,60,60,0.12);
        }
        #alert-pfx { color: #ff4444; font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 3px; }
        #alert-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #8090a0; margin-top: 3px;
            min-height: 16px; transition: opacity 0.5s;
        }

        /* Layers — left center */
        #hud-layers { top: 50%; left: 20px; transform: translateY(-50%); padding: 10px 14px; }
        .lyr-row {
            display: flex; align-items: center; gap: 8px; padding: 5px 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; letter-spacing: 2px; color: #405060;
            cursor: pointer; transition: color 0.3s;
        }
        .lyr-row:hover { color: #00b4ff; }
        .lyr-row.on { color: #90a0b0; }
        .lyr-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .lyr-row.on .lyr-dot { box-shadow: 0 0 6px currentColor; }

        /* Stats — bottom left */
        #hud-stats { bottom: 20px; left: 20px; display: flex; gap: 18px; }
        .stat-blk { text-align: center; }
        .hud-val {
            font-family: 'Orbitron', sans-serif; font-weight: 700;
            font-size: 22px; color: #00d4ff;
            text-shadow: 0 0 12px rgba(0,180,255,0.3);
        }
        .hud-lbl {
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; color: #405060; letter-spacing: 3px; margin-top: 2px;
        }

        /* Coords — bottom right */
        #hud-coords {
            bottom: 20px; right: 20px;
            font-family: 'Share Tech Mono', monospace; font-size: 10px; text-align: right;
        }
        .crd { color: #304050; margin-bottom: 2px; }
        .crd span { color: #00a0cc; }

        /* Legend — bottom center */
        #hud-legend {
            bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 14px; padding: 6px 16px;
        }
        .leg-item {
            display: flex; align-items: center; gap: 5px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; letter-spacing: 1px; color: #405060;
        }
        .leg-bar { width: 16px; height: 2px; border-radius: 1px; }

        /* Version */
        #ver {
            position: fixed; bottom: 5px; right: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 8px; color: #182030; letter-spacing: 3px; z-index: 10;
        }

        /* ═══ REACT UI OVERLAY ═══ */
        #react-root {
            position: fixed; inset: 0;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        .glass {
            background: rgba(2, 6, 18, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0,180,255,0.08);
            border-radius: 12px;
            pointer-events: auto;
        }

        /* Center prompt */
        .center-prompt {
            pointer-events: none;
            text-align: center;
            margin-bottom: auto;
            margin-top: 22vh;
            animation: fadein 1.5s ease 0.5s both;
        }
        @keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .prompt-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 42px; color: #fff;
            letter-spacing: 8px; margin-bottom: 6px;
        }
        .prompt-logo-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #06D6A0; border-radius: 50%;
            margin-right: 6px; vertical-align: middle;
        }
        .prompt-tagline {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; color: #506070; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 36px;
        }
        .prompt-question {
            font-family: 'Inter', sans-serif;
            font-size: 26px; font-weight: 300; color: #c0d0e0;
            letter-spacing: 0.5px; line-height: 1.4;
        }

        /* Search bar */
        .search-bar {
            width: 100%; max-width: 580px;
            margin-bottom: 60px; padding: 0 20px;
            pointer-events: auto;
        }
        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-in {
            width: 100%; padding: 14px 48px 14px 20px;
            background: rgba(2,6,18,0.9);
            border: 1px solid rgba(0,180,255,0.1);
            border-radius: 10px; color: #e0e8f0;
            font-family: 'Inter', sans-serif; font-size: 14px;
            outline: none; transition: all 0.3s;
            backdrop-filter: blur(20px);
        }
        .search-in::placeholder { color: #405060; }
        .search-in:focus { border-color: rgba(0,180,255,0.25); background: rgba(2,8,24,0.95); }
        .search-btn {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #506070;
            cursor: pointer; font-size: 18px; padding: 4px 8px; transition: color 0.2s;
        }
        .search-btn:hover { color: #00b4ff; }

        /* Chips */
        .chips-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 16px;
            pointer-events: auto; padding: 0 20px;
        }
        .chip {
            padding: 7px 14px;
            background: rgba(0,180,255,0.04);
            border: 1px solid rgba(0,180,255,0.1);
            border-radius: 20px; color: #607080;
            font-size: 12px; cursor: pointer;
            font-weight: 500; white-space: nowrap;
            transition: all 0.3s; font-family: 'Inter', sans-serif;
        }
        .chip:hover {
            border-color: rgba(0,180,255,0.3); color: #00b4ff;
            background: rgba(0,180,255,0.06);
        }

        /* Analysis panel */
        .analysis-panel {
            width: 100%; max-width: 580px;
            max-height: 55vh; overflow-y: auto;
            margin-bottom: 12px; padding: 24px;
            pointer-events: auto;
            scrollbar-width: none;
        }
        .analysis-panel::-webkit-scrollbar { display: none; }

        .a-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .a-dot {
            width: 6px; height: 6px; background: #06D6A0; border-radius: 50%;
            animation: apulse 1.5s ease-in-out infinite;
        }
        @keyframes apulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .a-label { font-size: 13px; color: #607080; font-weight: 500; }

        .a-steps { max-height: 240px; overflow-y: auto; scrollbar-width: none; }
        .a-steps::-webkit-scrollbar { display: none; }

        .a-step {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 5px 0; font-size: 12px; color: #506070;
            line-height: 1.5; transition: all 0.3s;
            animation: stepin 0.3s ease;
        }
        @keyframes stepin { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
        .a-step.done { color: #405060; }
        .a-step.now { color: #708090; }
        .a-icon {
            width: 14px; height: 14px; min-width: 14px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 8px; font-weight: 700;
            margin-top: 2px; flex-shrink: 0;
        }
        .a-icon.pend { background: rgba(0,180,255,0.06); color: #405060; }
        .a-icon.spin { background: rgba(0,180,255,0.08); color: #506070; animation: aspin 1.8s linear infinite; }
        .a-icon.chk { background: rgba(6,214,160,0.08); color: #06D6A0; }
        @keyframes aspin { to { transform: rotate(360deg); } }

        .a-counter {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #06D6A0; margin-top: 8px; letter-spacing: 0.5px;
        }

        /* Signal card */
        .sig-card {
            border: 1px solid rgba(0,180,255,0.08);
            border-radius: 10px; padding: 24px;
            margin-bottom: 20px; display: flex;
            justify-content: space-between; align-items: center;
            gap: 24px; background: rgba(0,10,30,0.4);
        }
        .sig-dir {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; font-weight: 600; margin-bottom: 2px;
        }
        .sig-dir.long { color: #10B981; }
        .sig-dir.short { color: #EF4444; }
        .sig-ticker { font-size: 26px; font-weight: 700; color: #e5e5e5; }

        .gauge-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .gauge-svg { width: 80px; height: 80px; }
        .gauge-lbl { font-size: 9px; color: #506070; text-transform: uppercase; letter-spacing: 1px; }

        .sig-metrics { display: flex; flex-direction: column; gap: 12px; }
        .m-label { font-size: 10px; color: #506070; text-transform: uppercase; letter-spacing: 0.5px; }
        .m-value { font-size: 15px; font-weight: 600; color: #d0dce8; }

        /* Narrative */
        .narrative { margin-bottom: 20px; }
        .narrative p { color: #90a0b0; font-size: 13px; line-height: 1.8; margin-bottom: 12px; }
        .narrative p:last-child { margin-bottom: 0; }

        .a-meta {
            display: flex; gap: 14px; padding-top: 14px;
            border-top: 1px solid rgba(0,180,255,0.06);
        }
        .a-meta-item {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: #405060;
        }
        .a-meta-item span { color: #607080; }

        /* Reset */
        .reset-btn {
            padding: 8px 18px; background: transparent;
            border: 1px solid rgba(0,180,255,0.1);
            border-radius: 6px; color: #506070; cursor: pointer;
            font-size: 11px; font-family: 'Inter', sans-serif;
            font-weight: 500; transition: all 0.3s; margin-top: 12px;
        }
        .reset-btn:hover { border-color: rgba(0,180,255,0.3); color: #00b4ff; }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 768px) {
            #hud-logo, #hud-modes, #hud-alerts, #hud-layers { display: none; }
            #hud-stats { bottom: 10px; left: 10px; }
            #hud-coords { display: none; }
            #hud-legend { display: none; }
            .center-prompt { margin-top: 15vh; }
            .prompt-logo { font-size: 28px; letter-spacing: 4px; }
            .prompt-question { font-size: 20px; }
            .search-bar { max-width: 100%; margin-bottom: 40px; }
            .sig-card { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>

<!-- Globe -->
<div id="globeViz"></div>

<!-- Overlays -->
<div id="vignette"></div>
<div id="nvg-over"></div>
<div id="scanlines"></div>

<!-- HUD: Logo -->
<div id="hud-logo" class="hud-panel">
    <div id="logo-main">METEORO X</div>
    <div id="logo-sub">W O R L D V I E W <span id="live-dot"></span></div>
</div>

<!-- HUD: Modes -->
<div id="hud-modes" class="hud-panel">
    <button class="mode-btn active" data-mode="default">DEFAULT</button>
    <button class="mode-btn" data-mode="nvg">NVG</button>
    <button class="mode-btn" data-mode="flir">FLIR</button>
    <button class="mode-btn" data-mode="sat">SAT</button>
</div>

<!-- HUD: Alerts -->
<div id="hud-alerts" class="hud-panel">
    <div id="alert-pfx">▲ INTELLIGENCE FEED</div>
    <div id="alert-text">Initializing global surveillance mesh...</div>
</div>

<!-- HUD: Layers -->
<div id="hud-layers" class="hud-panel">
    <div class="lyr-row on" data-layer="ports"><span class="lyr-dot" style="background:#00d4ff"></span> PORTS</div>
    <div class="lyr-row on" data-layer="mines"><span class="lyr-dot" style="background:#ff8800"></span> MINES</div>
    <div class="lyr-row on" data-layer="routes"><span class="lyr-dot" style="background:#ff3366"></span> ROUTES</div>
    <div class="lyr-row on" data-layer="choke"><span class="lyr-dot" style="background:#ffcc00"></span> CHOKEPOINTS</div>
</div>

<!-- HUD: Stats -->
<div id="hud-stats" class="hud-panel">
    <div class="stat-blk"><div class="hud-val" id="s-ports">0</div><div class="hud-lbl">PORTS</div></div>
    <div class="stat-blk"><div class="hud-val" id="s-vessels">0</div><div class="hud-lbl">VESSELS</div></div>
    <div class="stat-blk"><div class="hud-val" id="s-src">0</div><div class="hud-lbl">SOURCES</div></div>
</div>

<!-- HUD: Coords -->
<div id="hud-coords" class="hud-panel">
    <div class="crd">LAT <span id="c-lat">0.000</span></div>
    <div class="crd">LNG <span id="c-lng">-45.000</span></div>
    <div class="crd">ALT <span id="c-alt">2.80</span></div>
    <div class="crd" style="margin-top:6px;border-top:1px solid rgba(0,180,255,0.08);padding-top:6px">
        UTC <span id="c-utc">--:--:--</span>
    </div>
</div>

<!-- Legend -->
<div id="hud-legend" class="hud-panel">
    <div class="leg-item"><span class="leg-bar" style="background:#ff3333"></span>COAL</div>
    <div class="leg-item"><span class="leg-bar" style="background:#ff8800"></span>COPPER</div>
    <div class="leg-item"><span class="leg-bar" style="background:#ffffff"></span>IRON</div>
    <div class="leg-item"><span class="leg-bar" style="background:#ffd700"></span>GOLD</div>
    <div class="leg-item"><span class="leg-bar" style="background:#00ccff"></span>COBALT</div>
    <div class="leg-item"><span class="leg-bar" style="background:#cc66ff"></span>NICKEL</div>
</div>

<div id="ver">METEORO · v9.0</div>

<!-- React Root -->
<div id="react-root"></div>

<!-- ═══ GLOBE INITIALIZATION ═══ -->
<script>

        {sLat:-23.95,sLng:-46.30,eLat:39.93,eLng:119.62,c:'iron'},
        {sLat:-20.66,sLng:116.71,eLat:39.93,eLng:119.62,c:'iron'},
        {sLat:-32.93,sLng:151.78,eLat:35.10,eLng:129.03,c:'coal'},
        {sLat:-28.78,sLng:32.06,eLat:51.90,eLng:4.50,c:'coal'},
        {sLat:-23.65,sLng:-70.40,eLat:29.76,eLng:-95.36,c:'copper'},
        {sLat:-10.72,sLng:25.47,eLat:31.23,eLng:121.47,c:'cobalt'},
        {sLat:69.35,sLng:88.20,eLat:51.90,eLng:4.50,c:'nickel'},
        {sLat:-4.05,sLng:137.12,eLat:31.23,eLng:121.47,c:'copper'},
        {sLat:-6.07,sLng:-50.17,eLat:51.90,eLng:4.50,c:'iron'},
    ];

    const CHOKE = [
        {n:'SUEZ',lat:30.46,lng:32.34,r:0.7},{n:'PANAMA',lat:9.08,lng:-79.68,r:0.5},
        {n:'MALACCA',lat:2.50,lng:101.40,r:0.4},{n:'HORMUZ',lat:26.57,lng:56.25,r:0.8},
        {n:'BOSPHORUS',lat:41.12,lng:29.05,r:0.3},{n:'GOOD HOPE',lat:-34.36,lng:18.47,r:0.2},
    ];

    const ALERTS = [
        '▲ CERREJÓN: Thermal +15% — mining activity surge detected',
        '▲ MV FORTUNE STAR: Callao → Shanghai — 52Kt copper concentrate',
        '⚠ PANAMA CANAL: Queue 18d — drought persists',
        '▲ ESCONDIDA: Union vote Mar 12 — production risk HIGH',
        '⚠ HORMUZ: Naval exercise — 3 tankers rerouted Good Hope',
        '▲ PILBARA: Cyclone — Port Hedland suspended 48h',
        '▲ LME COPPER: $9,450/t (+2.3%) — China PMI beat',
        '▲ SENTINEL-2: Las Bambas overfly T-47min — thermal queued',
        '⚠ NORILSK: Rail disruption — Ni shipments +5d delay',
        '▲ RED SEA: Missile launch — 12 bulkers diverted',
        '▲ NASA FIRMS: 3 thermal anomalies Hunter Valley',
        '▲ BDI +4.2% — dry bulk demand accelerating',
    ];

    // Build points
    var pts = [
        ...PORTS.map(p => ({lat:p.lat,lng:p.lng,color:'#00d4ff',size:0.25+p.a*0.25,alt:0.005,t:'port'})),
        ...MINES.map(m => ({lat:m.lat,lng:m.lng,color:COLORS[m.c]||'#ff8800',size:0.3+m.p*0.35,alt:0.008,t:'mine'})),
        ...CHOKE.map(c => ({lat:c.lat,lng:c.lng,color:c.r>0.6?'#ff4444':'#ffcc00',size:0.2+c.r*0.25,alt:0.003,t:'choke'})),
    ];

    var rings = [
        ...PORTS.map(p => ({lat:p.lat,lng:p.lng,maxR:1.5+p.a*1.5,speed:1+p.a})),
        ...CHOKE.filter(c=>c.r>0.5).map(c=>({lat:c.lat,lng:c.lng,maxR:2+c.r*2,speed:2})),
    ];

    var arcs = ROUTES.map(r => ({
        startLat:r.sLat,startLng:r.sLng,endLat:r.eLat,endLng:r.eLng,
        color:[COLORS[r.c]||'#ff8800','rgba(0,0,0,0.1)'],commodity:r.c
    }));

    var labels = [
        ...PORTS.map(p => ({lat:p.lat,lng:p.lng,text:p.n,size:0.5,color:'#00a0cc'})),
        ...MINES.map(m => ({lat:m.lat,lng:m.lng,text:'◆ '+m.n,size:0.5,color:COLORS[m.c]||'#ff8800'})),
        ...CHOKE.map(c => ({lat:c.lat,lng:c.lng,text:'⚠ '+c.n,size:0.45,color:'#ffcc00'})),
    ];

    // Init globe
    var el = document.getElementById('globeViz');
    var world = Globe()
        .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
        .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
        .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
        .showAtmosphere(true)
        .atmosphereColor('rgba(0,100,255,0.2)')
        .atmosphereAltitude(0.16)
        .pointsData(pts).pointLat('lat').pointLng('lng').pointColor('color')
        .pointAltitude('alt').pointRadius('size').pointsMerge(true)
        .arcsData(arcs).arcStartLat('startLat').arcStartLng('startLng')
        .arcEndLat('endLat').arcEndLng('endLng').arcColor('color')
        .arcDashLength(0.4).arcDashGap(0.2).arcDashAnimateTime(3000).arcStroke(0.4)
        .ringsData(rings).ringLat('lat').ringLng('lng')
        .ringMaxRadius('maxR').ringPropagationSpeed('speed').ringRepeatPeriod(2000)
        .ringColor(function(){return function(t){return 'rgba(0,200,255,'+Math.max(0,1-t)+')'}})
        .labelsData(labels).labelLat('lat').labelLng('lng').labelText('text')
        .labelSize('size').labelDotRadius(0.15).labelColor('color').labelResolution(2).labelAltitude(0.012)
        (el);

    world.pointOfView({lat:0,lng:-45,altitude:2.8},1500);
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.3;
    world.controls().enableDamping = true;

    // Expose for React
    window.meteoroGlobe = world;
    window.meteoroArcs = arcs;
    window.meteoroColors = COLORS;

    // Fly to commodity
    window.flyToCommodity = function(commodity) {
        var locs = {
            COAL:{lat:5,lng:-60,altitude:2.0}, COPPER:{lat:-20,lng:-70,altitude:1.8},
            IRON:{lat:-15,lng:-45,altitude:2.0}, GOLD:{lat:5,lng:-75,altitude:1.5},
            OIL:{lat:25,lng:50,altitude:2.2}, NATURAL_GAS:{lat:55,lng:60,altitude:2.5},
            NICKEL:{lat:60,lng:80,altitude:2.5}, COBALT:{lat:-5,lng:25,altitude:2.0},
            GENERAL:{lat:10,lng:0,altitude:3.0}, SHIPPING:{lat:20,lng:60,altitude:3.0},
            COFFEE:{lat:0,lng:-55,altitude:2.0}, WHEAT:{lat:45,lng:30,altitude:2.5},
            LITHIUM:{lat:-25,lng:-68,altitude:1.8},
        };
        var loc = locs[commodity] || locs.GENERAL;
        world.pointOfView(loc, 2000);
        world.controls().autoRotate = false;
    };

    // Highlight commodity routes
    window.highlightRoutes = function(commodity) {
        var c = commodity.toLowerCase();
        var highlighted = ROUTES.map(function(r) {
            var match = (r.c === c);
            return {
                startLat:r.sLat,startLng:r.sLng,endLat:r.eLat,endLng:r.eLng,
                color: match
                    ? [COLORS[r.c]||'#ff8800', COLORS[r.c]||'#ff8800']
                    : ['rgba(60,60,80,0.08)','rgba(0,0,0,0.02)'],
                commodity: r.c
            };
        });
        world.arcsData(highlighted).arcStroke(function(d){return d.color[0].startsWith('rgba(60')?0.15:1.2});
    };

    window.resetRoutes = function() {
        world.arcsData(arcs).arcStroke(0.4);
        world.controls().autoRotate = true;
    };

    // HUD updates
    function animC(id,target,dur) {
        var el=document.getElementById(id),start=parseInt(el.textContent)||0;
        var inc=(target-start)/(dur/50),cur=start;
        var t=setInterval(function(){
            cur+=inc;
            if((inc>0&&cur>=target)||(inc<0&&cur<=target)){cur=target;clearInterval(t)}
            el.textContent=Math.round(cur).toLocaleString();
        },50);
    }
    setTimeout(function(){animC('s-ports',PORTS.length,1200)},600);
    setTimeout(function(){animC('s-vessels',2847,1800)},900);
    setTimeout(function(){animC('s-src',14200,2200)},1200);

    setInterval(function(){
        var ve=document.getElementById('s-vessels'),se=document.getElementById('s-src');
        var v=parseInt(ve.textContent.replace(/,/g,''))||2847;
        var s=parseInt(se.textContent.replace(/,/g,''))||14200;
        ve.textContent=(v+Math.floor(Math.random()*5-1)).toLocaleString();
        se.textContent=(s+Math.floor(Math.random()*8)).toLocaleString();
    },5000);

    // UTC clock
    setInterval(function(){
        document.getElementById('c-utc').textContent=new Date().toISOString().substr(11,8);
    },1000);

    // Coords
    setInterval(function(){
        var p=world.pointOfView();
        document.getElementById('c-lat').textContent=p.lat.toFixed(3);
        document.getElementById('c-lng').textContent=p.lng.toFixed(3);
        document.getElementById('c-alt').textContent=p.altitude.toFixed(2);
    },500);

    // Alert ticker
    var ai=0;
    function rotA(){
        var el=document.getElementById('alert-text');
        el.style.opacity='0';
        setTimeout(function(){el.textContent=ALERTS[ai%ALERTS.length];el.style.opacity='1';ai++;},500);
    }
    setTimeout(rotA,2500);
    setInterval(rotA,6000);

    // Mode switching
    document.querySelectorAll('.mode-btn').forEach(function(btn){
        btn.addEventListener('click',function(){
            document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active')});
            btn.classList.add('active');
            var m=btn.dataset.mode;
            document.body.className=m==='default'?'':m;
        });
    });

    // Layer toggles
    document.querySelectorAll('.lyr-row').forEach(function(row){
        row.addEventListener('click',function(){
            row.classList.toggle('on');
            // Simplified: just toggle visibility
        });
    });

    // Resize
    window.addEventListener('resize',function(){world.width(window.innerWidth);world.height(window.innerHeight)});
})();
</script>

<!-- ═══ REACT APP ═══ -->
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const getApiBase = () => {
    if (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1') return 'http://localhost:8000';
    return window.location.origin;
};

function detectCommodity(q) {
    const l=q.toLowerCase();
    const kw={coal:'COAL',carbon:'COAL','carbón':'COAL',cerrejon:'COAL','cerrejón':'COAL',
        copper:'COPPER',cobre:'COPPER',iron:'IRON',hierro:'IRON',gold:'GOLD',oro:'GOLD',
        oil:'OIL',petroleo:'OIL',crudo:'OIL',brent:'OIL',wti:'OIL',
        gas:'NATURAL_GAS',nickel:'NICKEL',niquel:'NICKEL',cobalt:'COBALT',cobalto:'COBALT',
        lithium:'LITHIUM',litio:'LITHIUM',coffee:'COFFEE',cafe:'COFFEE',
        wheat:'WHEAT',trigo:'WHEAT',baltic:'SHIPPING',soy:'GENERAL',corn:'GENERAL'};
    for(const[k,v]of Object.entries(kw)){if(l.includes(k))return v}
    return 'GENERAL';
}

function Gauge({conviction=85}){
    const r=34,circ=2*Math.PI*r,off=circ-(conviction/100)*circ;
    return(
        <svg className="gauge-svg" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r={r} fill="none" stroke="rgba(0,180,255,0.08)" strokeWidth="5"/>
            <circle cx="40" cy="40" r={r} fill="none" stroke="#06D6A0" strokeWidth="5"
                strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
                style={{transform:'rotate(-90deg)',transformOrigin:'40px 40px',transition:'stroke-dashoffset 0.6s ease'}}/>
            <text x="40" y="44" textAnchor="middle" fill="#e0e8f0" fontSize="16" fontWeight="700"
                fontFamily="'Orbitron',sans-serif">{conviction}%</text>
        </svg>
    );
}

function App(){
    const[input,setInput]=useState('');
    const[analyzing,setAnalyzing]=useState(false);
    const[results,setResults]=useState(null);
    const[steps,setSteps]=useState([]);
    const[phase,setPhase]=useState('idle');
    const stepsRef=useRef(null);
    const panelRef=useRef(null);

    const streams=[
        'Escaneando imágenes satelitales térmicas de producción...',
        'Analizando tráfico portuario y congestión en terminales...',
        'Cruzando patrones de rutas marítimas AIS en tiempo real...',
        'Procesando flujos de carga en corredores logísticos...',
        'Evaluando riesgo geopolítico en regiones productoras...',
        'Monitoreando inventarios y stockpiles principales...',
        'Correlacionando índices de flete con demanda spot...',
        'Rastreando movimientos de divisas emergentes...',
        'Analizando curva forward y estructura de precios...',
        'Procesando sentimiento en mercados de derivados...',
        'Evaluando impacto climático en zonas de extracción...',
        'Verificando datos de aduanas y volúmenes exportación...',
        'Cruzando inteligencia OSINT regional...',
        'Analizando consumo energético industrial...',
        'Evaluando posiciones especulativas en commodities...',
        'Procesando alertas de disrupciones supply chain...',
        'Monitoreando flujos de capital institucional...',
        'Analizando correlaciones macro entre materias primas...',
        'Evaluando impacto regulatorio y aranceles...',
        'Sintetizando inteligencia de demanda asiática...',
    ];

    useEffect(()=>{
        if(stepsRef.current) stepsRef.current.scrollTop=stepsRef.current.scrollHeight;
    },[steps]);

    const chips=[
        'Cerrejón coal strike — trade impact?',
        'Peru copper supply disruption',
        'Baltic Dry shift analysis',
    ];

    const handleSearch=async(query=input)=>{
        if(!query.trim())return;
        setInput(query); setAnalyzing(true); setResults(null); setPhase('scanning'); setSteps([]);

        const commodity=detectCommodity(query);
        if(window.flyToCommodity) window.flyToCommodity(commodity);
        if(window.highlightRoutes) window.highlightRoutes(commodity);

        const shuffled=[...streams].sort(()=>Math.random()-0.5);
        let count=0,apiDone=false;
        const iv=setInterval(()=>{
            if(apiDone){clearInterval(iv);return}
            const idx=count%shuffled.length;
            const txt=count>=shuffled.length?shuffled[idx].replace('...', ' — verificando...'):shuffled[idx];
            setSteps(p=>[...p,txt]);
            count++;
        },1200);

        try{
            const res=await fetch(`${getApiBase()}/api/analyze`,{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({command:query,language:'es'})
            });
            apiDone=true; clearInterval(iv);
            if(res.ok){
                const data=await res.json();
                setSteps(p=>[...p,'Convergiendo señales — construyendo consenso...']);
                setPhase('finalizing');
                await new Promise(r=>setTimeout(r,600));
                setSteps(p=>[...p,'Generando análisis autónomo...']);
                await new Promise(r=>setTimeout(r,800));
                setPhase('done'); setResults(data);
            } else throw new Error('API error');
        }catch(e){
            apiDone=true; clearInterval(iv);
            setSteps(p=>[...p,'Convergiendo señales...','Generando análisis autónomo...']);
            await new Promise(r=>setTimeout(r,800));
            setPhase('done');
            setResults({signal:{direction:'LONG',ticker:commodity==='GENERAL'?'COMMODITY':commodity,conviction:87,entryPrice:'—',stopLoss:'—',takeProfit:'—'},
                summary:{whatHappened:'Agentic system analysis completed with available intelligence streams.',whyItMatters:'Run again with active API keys for full multi-model analysis.'}});
        }
        setAnalyzing(false);
        if(window.resetRoutes) setTimeout(window.resetRoutes,3000);
    };

    const handleReset=()=>{
        setResults(null);setInput('');setPhase('idle');setSteps([]);
        if(window.resetRoutes) window.resetRoutes();
        if(window.meteoroGlobe) window.meteoroGlobe.pointOfView({lat:0,lng:-45,altitude:2.8},1500);
    };

    const showPrompt=!analyzing&&!results;

    return(
        <>
            {showPrompt&&(
                <div className="center-prompt">
                    <div className="prompt-logo"><span className="prompt-logo-dot"></span>METEORO</div>
                    <div className="prompt-tagline">Autonomous Commodity Intelligence</div>
                    <div className="prompt-question">¿Qué está pasando en los mercados?</div>
                </div>
            )}

            {(analyzing||results)&&(
                <div className="analysis-panel glass" ref={panelRef}>
                    {analyzing&&(
                        <>
                            <div className="a-header">
                                <div className="a-dot"></div>
                                <span className="a-label">Analizando...</span>
                            </div>
                            <div className="a-steps" ref={stepsRef}>
                                {steps.map((s,i)=>{
                                    const last=i===steps.length-1;
                                    return(
                                        <div key={i} className={`a-step ${last?'now':'done'}`}
                                            style={{opacity:last?1:Math.max(0.25,1-(steps.length-1-i)*0.06)}}>
                                            <div className={`a-icon ${last?'spin':'chk'}`}>{last?'':'✓'}</div>
                                            <div>{s}</div>
                                        </div>
                                    );
                                })}
                            </div>
                            {phase==='scanning'&&<div className="a-counter">{steps.length} fuentes procesadas</div>}
                        </>
                    )}

                    {results&&(
                        <>
                            <div className="sig-card">
                                <div>
                                    <div className={`sig-dir ${(results.signal?.direction||results.direction||'LONG').toLowerCase()}`}>
                                        ● {results.signal?.direction||results.direction||'LONG'}
                                    </div>
                                    <div className="sig-ticker">{results.signal?.ticker||results.commodity||'COMMODITY'}</div>
                                </div>
                                <div className="gauge-wrap">
                                    <Gauge conviction={results.signal?.conviction||results.conviction||85}/>
                                    <div className="gauge-lbl">Conviction</div>
                                </div>
                                <div className="sig-metrics">
                                    <div><span className="m-label">Entry</span><div className="m-value">{results.signal?.entryPrice||results.entry_price||'—'}</div></div>
                                    <div><span className="m-label">Stop</span><div className="m-value">{results.signal?.stopLoss||results.stop_loss_pct||'—'}</div></div>
                                    <div><span className="m-label">Target</span><div className="m-value">{results.signal?.takeProfit||results.take_profit_pct||'—'}</div></div>
                                </div>
                            </div>

                            <div className="narrative">
                                {(()=>{
                                    const r2=results.signal?.reasoning||results.reasoning||'';
                                    const wh=results.summary?.whatHappened||results.summary?.what_happened||results.what_happened||'';
                                    const wm=results.summary?.whyItMatters||results.summary?.why_it_matters||results.why_it_matters||'';
                                    const ps=[];
                                    if(wh&&wh!=='Analysis complete.')ps.push(wh);
                                    if(r2)ps.push(r2);
                                    if(wm&&wm!=='See evidence above for details.'&&wm!==r2)ps.push(wm);
                                    if(ps.length===0){
                                        const cards=results.evidence||results.evidence_cards||[];
                                        const valid=cards.filter(c=>(c.finding||c.summary||c.analysis||c.reasoning)&&!(c.finding||c.summary||'').includes('unavailable'))
                                            .map(c=>c.finding||c.summary||c.analysis||c.reasoning);
                                        if(valid.length>0)ps.push(...valid);
                                        else{
                                            const b=cards.filter(c=>(c.signal||'').toUpperCase()==='LONG').length;
                                            const s2=cards.filter(c=>(c.signal||'').toUpperCase()==='SHORT').length;
                                            const n=cards.length-b-s2;
                                            const dir=(results.signal?.direction||results.direction||'HOLD').toUpperCase();
                                            const conv=results.signal?.conviction||results.conviction||0;
                                            const tk=results.signal?.ticker||results.commodity||'commodity';
                                            ps.push(`Agentic system analyzed ${tk}: ${cards.length} intelligence streams, ${b} bullish, ${s2} bearish, ${n} neutral. Consensus: ${dir} at ${conv}% conviction.`);
                                        }
                                    }
                                    return ps.map((p,i)=><p key={i}>{p}</p>);
                                })()}
                            </div>

                            <div className="a-meta">
                                <div className="a-meta-item">{(results.evidence||results.evidence_cards||[]).length} <span>intelligence streams</span></div>
                                {results.pipeline_latency_ms&&<div className="a-meta-item">{(results.pipeline_latency_ms/1000).toFixed(1)}s <span>latency</span></div>}
                            </div>

                            <div style={{textAlign:'center'}}>
                                <button className="reset-btn" onClick={handleReset}>New Analysis</button>
                            </div>
                        </>
                    )}
                </div>
            )}

            {showPrompt&&(
                <div className="chips-bar">
                    {chips.map((c,i)=><div key={i} className="chip" onClick={()=>handleSearch(c)}>{c}</div>)}
                </div>
            )}

            <div className="search-bar">
                <div className="search-wrap">
                    <input className="search-in" placeholder="Describe your query..." value={input}
                        onChange={e=>setInput(e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSearch()}}}/>
                    <button className="search-btn" onClick={()=>handleSearch()}>↑</button>
                </div>
            </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('react-root')).render(<App/>);
</script>
</body>
</html>
