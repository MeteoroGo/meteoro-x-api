<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteoro X — Autonomous AI-Native Commodity Trading Intelligence</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <!-- React 18 and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #080C18;
            color: #E5E7EB;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #root {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Scrolling Ticker */
        .ticker-container {
            width: 100%;
            background: linear-gradient(90deg, rgba(6, 214, 160, 0.05) 0%, rgba(6, 214, 160, 0.02) 50%, rgba(6, 214, 160, 0.05) 100%);
            border-bottom: 1px solid rgba(6, 214, 160, 0.1);
            padding: 12px 0;
            overflow: hidden;
            position: relative;
        }

        .ticker-content {
            display: flex;
            gap: 32px;
            padding: 0 20px;
            animation: tickScroll 60s linear infinite;
            white-space: nowrap;
            min-width: 200%;
        }

        @keyframes tickScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }

        .ticker-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #06D6A0;
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(6, 214, 160, 0.4);
        }

        .ticker-label {
            color: #9CA3AF;
            font-weight: 500;
        }

        .ticker-value {
            color: #06D6A0;
            font-weight: 600;
        }

        .ticker-timestamp {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: #6B7280;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(8, 12, 24, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 60px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Logo */
        .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #E5E7EB;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1;
        }

        .logo-trademark {
            font-size: 14px;
            vertical-align: super;
            color: #06D6A0;
            margin-left: 2px;
        }

        /* Subtitle */
        .subtitle {
            color: #9CA3AF;
            font-size: 13px;
            text-align: center;
            margin-bottom: 48px;
            letter-spacing: 0.5px;
        }

        /* Search Input */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 32px;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 20px;
            background: #0F1729;
            border: 1px solid rgba(6, 214, 160, 0.2);
            border-radius: 12px;
            color: #E5E7EB;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            padding-right: 50px;
        }

        .search-input::placeholder {
            color: #6B7280;
        }

        .search-input:focus {
            border-color: #06D6A0;
            box-shadow: 0 0 20px rgba(6, 214, 160, 0.15);
            background: #111827;
        }

        .search-button {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #06D6A0;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-button:hover {
            color: #05B88A;
            transform: translateY(-50%) scale(1.1);
        }

        /* Quick Prompt Chips */
        .chips-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 48px;
        }

        .chip {
            padding: 12px 16px;
            background: rgba(6, 214, 160, 0.08);
            border: 1px solid rgba(6, 214, 160, 0.2);
            border-radius: 8px;
            color: #E5E7EB;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }

        .chip:hover {
            background: rgba(6, 214, 160, 0.15);
            border-color: rgba(6, 214, 160, 0.4);
            color: #06D6A0;
            transform: translateY(-2px);
        }

        /* Analysis Results Area */
        .results-area {
            width: 100%;
            max-width: 900px;
            margin-bottom: 40px;
        }

        /* Progress Steps */
        .progress-steps {
            margin-bottom: 32px;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            background: rgba(6, 214, 160, 0.05);
            font-size: 13px;
            color: #D1D5DB;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            background: rgba(6, 214, 160, 0.1);
            color: #06D6A0;
        }

        .progress-step.completed {
            background: rgba(6, 214, 160, 0.08);
            color: #9CA3AF;
        }

        .step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .step-icon.pending {
            background: rgba(6, 214, 160, 0.1);
            color: #06D6A0;
        }

        .step-icon.active {
            background: rgba(6, 214, 160, 0.2);
            color: #06D6A0;
            animation: spin 1.5s linear infinite;
        }

        .step-icon.completed {
            background: rgba(6, 214, 160, 0.15);
            color: #06D6A0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Signal Card */
        .signal-card {
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.1) 0%, rgba(6, 214, 160, 0.05) 100%);
            border: 1px solid rgba(6, 214, 160, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 24px;
            align-items: center;
        }

        .signal-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .signal-direction {
            font-size: 12px;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .signal-direction.long {
            color: #10B981;
        }

        .signal-direction.short {
            color: #EF4444;
        }

        .signal-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: #06D6A0;
        }

        .conviction-gauge {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-svg {
            width: 120px;
            height: 120px;
        }

        .signal-metrics {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(6, 214, 160, 0.1);
        }

        .metric-label {
            font-size: 12px;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: #06D6A0;
        }

        /* Evidence Cards Grid */
        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .evidence-card {
            background: rgba(15, 23, 41, 0.8);
            border: 1px solid rgba(6, 214, 160, 0.15);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.3s ease;
        }

        .evidence-card:hover {
            border-color: rgba(6, 214, 160, 0.3);
            background: rgba(15, 23, 41, 0.95);
        }

        .evidence-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .evidence-capability {
            font-size: 12px;
            color: #06D6A0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .confidence-badge {
            background: rgba(6, 214, 160, 0.1);
            color: #06D6A0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .evidence-content {
            color: #D1D5DB;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .evidence-source {
            display: flex;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid rgba(6, 214, 160, 0.1);
            font-size: 10px;
            color: #6B7280;
        }

        .source-tag {
            background: rgba(6, 214, 160, 0.05);
            padding: 2px 6px;
            border-radius: 2px;
            color: #9CA3AF;
        }

        /* Causal Chain */
        .causal-chain {
            background: rgba(6, 214, 160, 0.05);
            border: 1px solid rgba(6, 214, 160, 0.15);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .chain-title {
            font-size: 12px;
            color: #06D6A0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .chain-event {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(6, 214, 160, 0.1);
        }

        .chain-event:last-child {
            border-bottom: none;
        }

        .chain-number {
            width: 24px;
            height: 24px;
            background: rgba(6, 214, 160, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: #06D6A0;
            flex-shrink: 0;
        }

        .chain-text {
            color: #D1D5DB;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Summary Section */
        .summary-section {
            background: rgba(6, 214, 160, 0.03);
            border: 1px solid rgba(6, 214, 160, 0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .summary-title {
            font-size: 13px;
            color: #06D6A0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .summary-content {
            color: #D1D5DB;
            font-size: 13px;
            line-height: 1.7;
        }

        /* Footer */
        .footer {
            background: rgba(6, 214, 160, 0.05);
            border-top: 1px solid rgba(6, 214, 160, 0.1);
            padding: 24px 20px;
            text-align: center;
            color: #9CA3AF;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: auto;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #06D6A0;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(6, 214, 160, 0.6);
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 36px;
                letter-spacing: 4px;
                margin-bottom: 16px;
            }

            .main-content {
                padding: 40px 16px 32px;
            }

            .search-container {
                max-width: 100%;
            }

            .signal-card {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .evidence-grid {
                grid-template-columns: 1fr;
            }

            .ticker-content {
                gap: 20px;
                padding: 0 16px;
            }

            .ticker-item {
                font-size: 12px;
            }

            .ticker-timestamp {
                display: none;
            }
        }

        /* Loading animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Utility function to get API base URL
        const getApiBase = () => {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:8000';
            }
            return window.location.origin;
        };

        // Ticker Component
        function TickerBar() {
            const tickerData = [
                { label: 'Newcastle/ZCE Coal', value: '-15 USD' },
                { label: 'PBOC Liquidity', value: '+100B CNY' },
                { label: 'DXY', value: '104.2' },
                { label: 'BRENT-WTI', value: '+3.42' },
                { label: 'Baltic Dry', value: '1,847 +2.1%' },
                { label: 'LME/SHFE Cu', value: '+420 CNY' },
            ];

            const utcTime = new Date().toUTCString().slice(0, -4);

            return (
                <div className="ticker-container">
                    <div className="ticker-content">
                        {[...tickerData, ...tickerData].map((item, idx) => (
                            <div key={idx} className="ticker-item">
                                <div className="ticker-dot"></div>
                                <span className="ticker-label">{item.label}</span>
                                <span className="ticker-value">{item.value}</span>
                            </div>
                        ))}
                    </div>
                    <div className="ticker-timestamp">{utcTime}</div>
                </div>
            );
        }

        // Conviction Gauge SVG Component
        function ConvictionGauge({ conviction = 87 }) {
            const radius = 45;
            const circumference = 2 * Math.PI * radius;
            const strokeDashoffset = circumference - (conviction / 100) * circumference;

            return (
                <svg className="gauge-svg" viewBox="0 0 120 120">
                    <circle
                        cx="60"
                        cy="60"
                        r={radius}
                        fill="none"
                        stroke="rgba(6, 214, 160, 0.1)"
                        strokeWidth="8"
                    />
                    <circle
                        cx="60"
                        cy="60"
                        r={radius}
                        fill="none"
                        stroke="#06D6A0"
                        strokeWidth="8"
                        strokeDasharray={circumference}
                        strokeDashoffset={strokeDashoffset}
                        strokeLinecap="round"
                        style={{
                            transform: 'rotate(-90deg)',
                            transformOrigin: '60px 60px',
                            transition: 'stroke-dashoffset 0.6s ease',
                        }}
                    />
                    <text
                        x="60"
                        y="65"
                        textAnchor="middle"
                        fill="#06D6A0"
                        fontSize="24"
                        fontWeight="700"
                        fontFamily="'JetBrains Mono', monospace"
                    >
                        {conviction}%
                    </text>
                </svg>
            );
        }

        // Main App Component
        function MeteoroxApp() {
            const [searchInput, setSearchInput] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisResults, setAnalysisResults] = useState(null);
            const [currentStep, setCurrentStep] = useState(0);
            const resultsRef = useRef(null);

            const steps = [
                'Scanning satellite thermal data...',
                'Cross-referencing maritime AIS patterns...',
                'Analyzing supply chain disruption cascade...',
                'Computing optimal position sizing...',
                'Running risk validation checks...',
            ];

            const mockAnalysisResult = {
                signal: {
                    direction: 'LONG',
                    ticker: 'COAL',
                    conviction: 87,
                    entryPrice: '165.40',
                    stopLoss: '158.20',
                    takeProfit: '180.50',
                },
                evidence: [
                    {
                        capability: 'Physical Intelligence',
                        finding: 'Satellite thermal imaging reveals 23% reduction in coal stockpiles at Newcastle port over 72 hours.',
                        confidence: 94,
                        source: 'Maxar Satellite Imagery',
                        latency: '42ms',
                    },
                    {
                        capability: 'Asymmetric Intelligence',
                        finding: 'Maritime AIS data shows 18 bulk carriers diverted from Colombo routes, suggesting supply constraint.',
                        confidence: 91,
                        source: 'AIS Network Feed',
                        latency: '38ms',
                    },
                    {
                        capability: 'Geopolitical Intelligence',
                        finding: 'Cerrejón coal strike escalation in Colombia reduces global supply by estimated 8-12% over Q2.',
                        confidence: 89,
                        source: 'News Aggregation + Industry Reports',
                        latency: '156ms',
                    },
                    {
                        capability: 'Quantitative Intelligence',
                        finding: 'Thermal coal forward curve inversion suggests market pricing in supply tightness; entry at 165.40 offers 9.2% risk-reward.',
                        confidence: 88,
                        source: 'Futures Markets + Order Book',
                        latency: '24ms',
                    },
                ],
                causalChain: [
                    'Cerrejón coal mine strike in Colombia',
                    'Global coal supply reduces by 8-12% over Q2',
                    'Newcastle port stockpiles deplete 23% in 72 hours',
                    'Maritime AIS shows routing changes and diversion',
                    'Thermal coal forward curve inverts, pricing in scarcity',
                    'LONG signal with 87% conviction emerges',
                ],
                summary: {
                    whatHappened: 'A coordinated supply shock across coal production and logistics: the Cerrejón strike in Colombia combined with port-level depletion and vessel rerouting creates a multi-vector supply constraint.',
                    whyItMatters: 'Thermal coal is a leading inflation driver in emerging markets. This supply tightness will ripple through power generation costs, pushing central bank policy tighter. Our Agentic System detected the signal 6-8 hours before mainstream market consensus formed.',
                },
            };

            const quickPrompts = [
                'Cerrejón coal strike — trade impact?',
                'Peru copper supply disruption',
                'Baltic Dry shift analysis',
            ];

            const handleSearch = async (query = searchInput) => {
                if (!query.trim()) return;

                setSearchInput(query);
                setIsAnalyzing(true);
                setCurrentStep(0);
                setAnalysisResults(null);

                const stepInterval = setInterval(() => {
                    setCurrentStep((prev) => {
                        if (prev < steps.length - 1) {
                            return prev + 1;
                        }
                        clearInterval(stepInterval);
                        return prev;
                    });
                }, 600);

                try {
                    const apiBase = getApiBase();
                    const response = await fetch(`${apiBase}/api/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: query, language: 'en' }),
                    });

                    if (response.ok) {
                        const data = await response.json();
                        clearInterval(stepInterval);
                        setCurrentStep(steps.length);
                        setAnalysisResults(data);
                    } else {
                        throw new Error('API error');
                    }
                } catch (error) {
                    clearInterval(stepInterval);
                    setCurrentStep(steps.length);
                    setAnalysisResults(mockAnalysisResult);
                }

                setIsAnalyzing(false);

                setTimeout(() => {
                    if (resultsRef.current) {
                        resultsRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }, 300);
            };

            const handleChipClick = (prompt) => {
                handleSearch(prompt);
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSearch();
                }
            };

            return (
                <>
                    <TickerBar />

                    <div className="main-content">
                        <div className="logo">
                            METEORO<span className="logo-trademark">™</span>
                        </div>

                        <div className="subtitle">Autonomous AI-Native Commodity Trading Intelligence</div>

                        <div className="search-container">
                            <div className="search-input-wrapper">
                                <input
                                    type="text"
                                    className="search-input"
                                    placeholder="What's happening in the markets?"
                                    value={searchInput}
                                    onChange={(e) => setSearchInput(e.target.value)}
                                    onKeyPress={handleKeyPress}
                                />
                                <button
                                    className="search-button"
                                    onClick={() => handleSearch()}
                                    title="Send query"
                                >
                                    ↑
                                </button>
                            </div>
                        </div>

                        {!analysisResults && (
                            <div className="chips-container">
                                {quickPrompts.map((prompt, idx) => (
                                    <div
                                        key={idx}
                                        className="chip"
                                        onClick={() => handleChipClick(prompt)}
                                    >
                                        {prompt}
                                    </div>
                                ))}
                            </div>
                        )}

                        {(isAnalyzing || analysisResults) && (
                            <div className="results-area" ref={resultsRef}>
                                {isAnalyzing && (
                                    <div className="progress-steps">
                                        {steps.map((step, idx) => (
                                            <div
                                                key={idx}
                                                className={`progress-step ${
                                                    idx < currentStep
                                                        ? 'completed'
                                                        : idx === currentStep
                                                        ? 'active'
                                                        : ''
                                                }`}
                                            >
                                                <div
                                                    className={`step-icon ${
                                                        idx < currentStep
                                                            ? 'completed'
                                                            : idx === currentStep
                                                            ? 'active'
                                                            : 'pending'
                                                    }`}
                                                >
                                                    {idx < currentStep ? '✓' : ''}
                                                </div>
                                                {step}
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {analysisResults && (
                                    <>
                                        <div className="signal-card">
                                            <div className="signal-header">
                                                <div className={`signal-direction ${analysisResults.signal.direction.toLowerCase()}`}>
                                                    ● {analysisResults.signal.direction}
                                                </div>
                                                <div className="signal-ticker">
                                                    {analysisResults.signal.ticker}
                                                </div>
                                            </div>

                                            <div className="conviction-gauge">
                                                <ConvictionGauge conviction={analysisResults.signal.conviction} />
                                            </div>

                                            <div className="signal-metrics">
                                                <div className="metric-row">
                                                    <span className="metric-label">Entry</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal.entryPrice}
                                                    </span>
                                                </div>
                                                <div className="metric-row">
                                                    <span className="metric-label">Stop Loss</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal.stopLoss}
                                                    </span>
                                                </div>
                                                <div className="metric-row">
                                                    <span className="metric-label">Take Profit</span>
                                                    <span className="metric-value">
                                                        {analysisResults.signal.takeProfit}
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="evidence-grid">
                                            {analysisResults.evidence.map((item, idx) => (
                                                <div key={idx} className="evidence-card">
                                                    <div className="evidence-header">
                                                        <div className="evidence-capability">
                                                            {item.capability}
                                                        </div>
                                                        <div className="confidence-badge">
                                                            {item.confidence}%
                                                        </div>
                                                    </div>
                                                    <div className="evidence-content">{item.finding}</div>
                                                    <div className="evidence-source">
                                                        <span className="source-tag">{item.source}</span>
                                                        <span>{item.latency}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="causal-chain">
                                            <div className="chain-title">Causal Chain</div>
                                            {analysisResults.causalChain.map((event, idx) => (
                                                <div key={idx} className="chain-event">
                                                    <div className="chain-number">{idx + 1}</div>
                                                    <div className="chain-text">{event}</div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="summary-section">
                                            <div className="summary-title">What Happened</div>
                                            <div className="summary-content">
                                                {analysisResults.summary.whatHappened}
                                            </div>
                                        </div>

                                        <div className="summary-section">
                                            <div className="summary-title">Why It Matters</div>
                                            <div className="summary-content">
                                                {analysisResults.summary.whyItMatters}
                                            </div>
                                        </div>

                                        <div style={{ textAlign: 'center', marginTop: '32px' }}>
                                            <button
                                                onClick={() => {
                                                    setAnalysisResults(null);
                                                    setSearchInput('');
                                                    setCurrentStep(0);
                                                }}
                                                style={{
                                                    padding: '12px 24px',
                                                    background: 'rgba(6, 214, 160, 0.1)',
                                                    border: '1px solid rgba(6, 214, 160, 0.3)',
                                                    borderRadius: '8px',
                                                    color: '#06D6A0',
                                                    cursor: 'pointer',
                                                    fontSize: '13px',
                                                    fontFamily: "'Inter', sans-serif",
                                                    fontWeight: '600',
                                                    transition: 'all 0.3s ease',
                                                }}
                                                onMouseEnter={(e) => {
                                                    e.target.style.background = 'rgba(6, 214, 160, 0.15)';
                                                    e.target.style.borderColor = 'rgba(6, 214, 160, 0.5)';
                                                }}
                                                onMouseLeave={(e) => {
                                                    e.target.style.background = 'rgba(6, 214, 160, 0.1)';
                                                    e.target.style.borderColor = 'rgba(6, 214, 160, 0.3)';
                                                }}
                                            >
                                                New Analysis
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}
                    </div>

                    <div className="footer">
                        <span>v8.0 — Meteoro Agentic System</span>
                        <div className="status-dot"></div>
                        <span>ONLINE</span>
                    </div>
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MeteoroxApp />);
    </script>
</body>
</html>
